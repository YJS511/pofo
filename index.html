<style id="app-css">
/* ============ RESET / BASE ============ */
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{
  font-family:var(--font-sans);   /* 앱 UI는 항상 고정 폰트 — 미리보기 폰트 변경에 영향 안 받음 */
  color:var(--text);
  background:var(--bg);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  overflow:hidden;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit}
::selection{background:rgba(74,74,74,.28)}
.hidden{display:none !important}

/* scrollbars — 전역 숨김 (스크롤 동작은 유지) */
*{scrollbar-width:none;-ms-overflow-style:none}
*::-webkit-scrollbar{width:0;height:0;display:none}
.scroll,.no-bar{scrollbar-width:none;-ms-overflow-style:none}
.scroll::-webkit-scrollbar,.no-bar::-webkit-scrollbar{width:0;height:0;display:none}

/* ============ TOPBAR ============ */
.topbar{
  height:52px;display:flex;align-items:center;gap:12px;
  padding:0 16px;border-bottom:1px solid var(--divider);
  background:var(--bg);position:relative;z-index:30;
}
.brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:16px;letter-spacing:-.01em}
.brand-right{margin-left:14px}
.brand .logo{width:26px;height:26px;border-radius:7px;display:grid;place-items:center;font-size:14px;background-color:var(--input-bg)}
/* 이미지 로고 — 연회색 둥근 박스 안에 투명 PNG */
.logo-img{background-color:var(--input-bg);background-size:90%;background-position:center;background-repeat:no-repeat;overflow:hidden;flex-shrink:0}
.brand .logo:hover{filter:brightness(.97)}
/* QR 코드 오버레이 */
.qr-ov{position:fixed;inset:0;z-index:300;display:grid;place-items:center;background:rgba(15,15,15,.55);animation:lzFade .15s ease;padding:20px}
.qr-ov.hidden{display:none}
.qr-card{background:var(--bg);border-radius:20px;padding:24px;width:340px;max-width:100%;box-shadow:0 24px 70px rgba(0,0,0,.4);animation:lzPop .22s cubic-bezier(.16,1,.3,1)}
.qr-title{font-size:17px;font-weight:700;letter-spacing:-.01em;margin-bottom:6px}
.qr-desc{font-size:12.5px;color:var(--text-faint);line-height:1.5;margin-bottom:14px}
.qr-card .inp{margin-bottom:14px}
.qr-box{width:100%;aspect-ratio:1;border-radius:14px;background:var(--input-bg);display:grid;place-items:center;overflow:hidden;margin-bottom:16px}
.qr-box img{width:100%;height:100%;object-fit:contain;background:#fff}
.qr-empty{font-size:12.5px;color:var(--text-faint);text-align:center;padding:0 20px}
.share-link-row{display:flex;gap:6px;margin-bottom:11px}
.share-link-row .inp{margin-bottom:0;font-size:12px;color:var(--text-light)}
.share-copy{flex-shrink:0;width:42px;display:grid;place-items:center;border-radius:9px;background:var(--input-bg);color:var(--text-light);transition:.12s}
.share-copy:hover{background:var(--hover);color:var(--text)}
.share-copy svg{width:15px;height:15px}
.qr-base{margin-bottom:10px}
.qr-base-label{display:block;font-size:10.5px;font-weight:600;color:var(--text-faint);margin-bottom:5px;line-height:1.4}
.qr-base .inp{margin-bottom:0;font-size:12px}
.qr-status{font-size:11px;color:var(--text-faint);line-height:1.55;margin-bottom:14px}
.qr-actions{display:flex;gap:8px;justify-content:flex-end}
.qr-actions .vbtn{height:36px;padding:0 14px;border-radius:8px;font-size:13px;font-weight:600;color:var(--text-light)}
.qr-actions .vbtn:hover{background:var(--hover)}
.qr-actions .tbtn.primary{height:36px}
/* 로고 확대 라이트박스 */
.logo-zoom{position:fixed;inset:0;z-index:300;display:grid;place-items:center;background:rgba(15,15,15,.55);animation:lzFade .15s ease}
.logo-zoom.hidden{display:none}
.logo-zoom-card{background:var(--bg);border-radius:24px;padding:24px;box-shadow:0 24px 70px rgba(0,0,0,.4);display:flex;flex-direction:column;align-items:center;cursor:default;animation:lzPop .22s cubic-bezier(.16,1,.3,1)}
.logo-zoom-card img{width:240px;height:240px;max-width:72vw;max-height:72vw;object-fit:contain}
.logo-zoom-name{font-weight:700;font-size:18px;letter-spacing:-.01em;color:var(--text)}
@keyframes lzFade{from{opacity:0}to{opacity:1}}
@keyframes lzPop{from{transform:scale(.86);opacity:.3}to{transform:none;opacity:1}}
.brand .sub{font-weight:400;font-size:12.5px;color:var(--text-faint);margin-left:3px}
@media(max-width:1080px){.brand .sub{display:none}}
.topbar .spacer{flex:1}

.tbtn{
  display:inline-flex;align-items:center;gap:6px;height:32px;padding:0 10px;border-radius:7px;
  font-size:13.5px;font-weight:500;color:var(--text-light);transition:background .12s,color .12s;white-space:nowrap;
}
.tbtn:hover{background:var(--hover);color:var(--text)}
.tbtn svg{width:16px;height:16px}
.tbtn.primary{background:#4A4A4A;color:#fff}
.tbtn.primary:hover{background:#2E2E2E}
.tbtn.active{background:var(--active-bg);color:#4A4A4A}
.tbtn .chev{width:13px;height:13px;opacity:.6}

.menu-wrap{position:relative}
.menu{
  position:absolute;top:38px;right:0;min-width:220px;background:var(--menu-bg);
  border:1px solid var(--divider);border-radius:11px;box-shadow:var(--shadow);
  padding:6px;z-index:50;
}
.menu.left{right:auto;left:0}
.menu-label{font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:var(--text-faint);padding:8px 9px 5px}
.menu-item{display:flex;align-items:center;gap:10px;padding:8px 9px;border-radius:7px;font-size:13.5px;width:100%;text-align:left;color:var(--text)}
.menu-item:hover{background:var(--hover)}
.menu-item .ico{width:18px;text-align:center;opacity:.8}
.menu-item .desc{display:block;font-size:11.5px;color:var(--text-faint);margin-top:1px}
.menu-sep{height:1px;background:var(--divider);margin:6px 4px}
/* 공유 메뉴 — 형식 선택 + 복사/다운로드 */
.fmt-pick{padding:4px 6px 6px}
.fmt-select{width:100%;height:38px;padding:0 10px;border:1px solid var(--divider);border-radius:9px;background:var(--input-bg);color:var(--text);font-size:13px;font-family:inherit;font-weight:500;cursor:pointer}
.fmt-select:focus{outline:none;border-color:#4A4A4A}
.fmt-actions{display:flex;gap:6px;margin-top:8px}
.fmt-btn{flex:1;height:36px;display:inline-flex;align-items:center;justify-content:center;gap:6px;border-radius:9px;font-size:13px;font-weight:600;color:var(--text-light);background:var(--input-bg);transition:.12s}
.fmt-btn svg{width:15px;height:15px}
.fmt-btn:hover:not(:disabled){background:var(--hover);color:var(--text)}
.fmt-btn.primary{background:#4A4A4A;color:#fff}
.fmt-btn.primary:hover{background:#2E2E2E}
.fmt-btn:disabled{opacity:.4;cursor:not-allowed}
/* 제작자 정보 카드 */
.tbtn.icon-only{padding:0;width:36px;justify-content:center;flex-shrink:0}
.tbtn.icon-only svg{width:18px;height:18px}
.about-card{min-width:268px;padding:16px}
.about-head{display:flex;align-items:center;gap:11px;margin-bottom:11px}
.about-logo{width:34px;height:34px;border-radius:9px;line-height:1}
.about-name{font-size:16px;font-weight:700;letter-spacing:-.01em}
.about-tag{font-size:12px;color:var(--text-faint);margin-top:1px}
.about-desc{font-size:12.5px;line-height:1.6;color:var(--text-light);margin:0 0 13px}
.about-rows{display:flex;flex-direction:column;gap:7px;border-top:1px solid var(--divider);padding-top:12px}
.about-row{display:flex;gap:10px;font-size:12.5px}
.about-row .ak{width:46px;flex-shrink:0;color:var(--text-faint)}
.about-row .av{color:var(--text);font-weight:500}
.about-row a.av{color:var(--accent,#4A4A4A)}
.about-row a.av:hover{text-decoration:underline}
.about-row .av{line-height:1.5}
.about-free{margin:13px 0 0;padding-top:12px;border-top:1px solid var(--divider);font-size:12px;color:var(--text-faint);text-align:center}

/* segmented control */
.seg{display:inline-flex;background:var(--input-bg);border-radius:8px;padding:3px;gap:2px}
.seg button{height:26px;padding:0 11px;border-radius:6px;font-size:12.5px;font-weight:500;color:var(--text-light)}
.seg button.on{background:var(--bg);color:var(--text);box-shadow:0 1px 2px rgba(0,0,0,.12)}
[data-mode="dark"] .seg button.on{background:rgba(255,255,255,.12)}

/* cover swatches */
.cover-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:6px 8px 10px}
.cover-sw{height:38px;border-radius:7px;border:2px solid transparent;cursor:pointer;position:relative}
.cover-sw.on{border-color:#4A4A4A}
.cover-sw.on::after{content:"✓";position:absolute;inset:0;display:grid;place-items:center;color:#fff;font-size:14px;text-shadow:0 1px 3px rgba(0,0,0,.5)}
.cover-up{display:grid;place-items:center;font-size:18px;color:var(--text-faint);background:var(--input-bg);border:1.5px dashed var(--divider)}
.cover-up:hover{color:var(--text);border-color:var(--text-faint)}

/* ============ WORKSPACE ============ */
.workspace{display:flex;height:calc(100vh - 52px);height:calc(100dvh - 52px)}

/* shared step number badge */
.qn-num{width:21px;height:21px;flex-shrink:0;border-radius:50%;display:grid;place-items:center;font-size:11px;font-weight:600;
  border:1px solid var(--divider);color:var(--text-faint);background:transparent;transition:.12s}

/* editor pane (merged steps + inputs as accordion) */
.editor{
  width:440px;flex-shrink:0;display:flex;flex-direction:column;min-height:0;
  background:var(--bg);
}
.editor.collapsed{display:none}
/* resizer / collapse handle */
.ed-resizer{width:7px;flex-shrink:0;position:relative;cursor:col-resize;background:transparent;z-index:20;transition:background .12s}
.ed-resizer::before{content:"";position:absolute;left:50%;top:0;bottom:0;width:1px;transform:translateX(-50%);background:var(--divider);transition:.12s}
.ed-resizer:hover::before,.ed-resizer.dragging::before{background:#4A4A4A;width:2px}
.ed-resizer:hover,.ed-resizer.dragging{background:rgba(74,74,74,.06)}
.ed-collapse{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:20px;height:42px;border-radius:6px;
  background:var(--bg);border:1px solid var(--divider);display:grid;place-items:center;color:var(--text-faint);
  box-shadow:0 1px 5px rgba(15,15,15,.1);opacity:0;transition:opacity .12s,color .12s,border-color .12s;cursor:pointer;z-index:21}
.ed-resizer:hover .ed-collapse{opacity:1}
.ed-collapse:hover{color:#4A4A4A;border-color:#4A4A4A}
.ed-collapse svg{width:13px;height:13px}
.workspace.ed-collapsed .ed-resizer{cursor:pointer}
.workspace.ed-collapsed .ed-resizer::before{background:var(--divider);width:1px}
.workspace.ed-collapsed .ed-collapse{opacity:1;left:12px;border-radius:0 8px 8px 0}
@media(max-width:767px){ .ed-resizer{display:none} }
/* editor top tabs */
.ed-tabs{display:flex;gap:5px;padding:9px 14px;border-bottom:1px solid var(--divider);flex-shrink:0}
.ed-tab{flex:1;height:36px;border-radius:9px;font-size:13.5px;font-weight:600;color:var(--text-light);
  display:flex;align-items:center;justify-content:center;gap:6px;transition:.12s}
.ed-tab:hover{background:var(--hover)}
.ed-tab.on{background:var(--active-bg);color:#4A4A4A}
.ed-pane{flex:1;display:flex;flex-direction:column;min-height:0}
.ed-pane.hidden{display:none}
.style-panel{flex:1;overflow-y:auto;padding:16px 18px 48px}
.progress-wrap{padding:16px 26px 14px;border-bottom:1px solid var(--divider);flex-shrink:0}
.progress-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:9px}
.progress-step{font-size:12px;font-weight:600;letter-spacing:.04em;color:var(--text-faint)}
.progress-name{font-size:12px;font-weight:600;color:var(--text-light);flex:1;text-align:center;padding:0 6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.progress-pct{font-size:12px;color:var(--text-faint)}
.progress-bar{height:6px;border-radius:6px;background:var(--input-bg);overflow:hidden}
.progress-fill{height:100%;background:#4A4A4A;border-radius:6px;transition:width .35s cubic-bezier(.4,0,.2,1)}

/* accordion */
.acc-scroll{flex:1;overflow-y:auto;padding:6px 18px 30px;position:relative;scroll-padding-top:6px}
.acc-item{border-bottom:1px solid var(--divider)}
.acc-head{display:flex;align-items:center;gap:13px;width:100%;text-align:left;padding:14px 7px;
  font-size:14.5px;font-weight:600;color:var(--text-light);transition:color .12s}
.acc-head:hover{color:var(--text)}
.acc-head.on{color:var(--text)}
.acc-title{flex:1}
.acc-chev{width:15px;height:15px;opacity:.4;transition:transform .22s;flex-shrink:0}
.acc-item.open .acc-chev{transform:rotate(180deg);opacity:.7}
.acc-head.on .qn-num{border-color:#4A4A4A;color:#4A4A4A}
.acc-item.done .acc-head:not(.on) .qn-num{border-color:transparent;color:#fff;background:#4A4A4A;font-size:11px}
.acc-body{padding:2px 7px 24px;animation:accIn .22s cubic-bezier(.4,0,.2,1)}
@keyframes accIn{from{transform:translateY(-4px)}to{transform:none}}

/* preset chips at end of accordion */
.acc-presets{display:flex;align-items:center;flex-wrap:wrap;gap:8px;padding:22px 7px 6px;margin-top:4px}
.acc-presets-label{font-size:12px;color:var(--text-faint);width:100%;margin-bottom:4px}
.chip{height:30px;padding:0 13px;border-radius:7px;font-size:13px;font-weight:500;background:var(--input-bg);color:var(--text-light);transition:.12s}
.chip:hover{background:var(--hover);color:var(--text)}
.chip.danger:hover{color:#eb5747}

.step-eyebrow{font-size:12px;font-weight:600;letter-spacing:.06em;color:var(--text-faint);margin-bottom:11px}
.step-title{font-size:25px;font-weight:700;letter-spacing:-.02em;margin-bottom:7px;line-height:1.2}
.step-desc{font-size:13.5px;color:var(--text);opacity:.72;line-height:1.6;margin-bottom:20px;max-width:46ch}

.field{margin-bottom:18px}
.field-label{display:block;font-size:12.5px;font-weight:600;color:var(--text-light);margin-bottom:7px}
.field-hint{font-size:12px;color:var(--text-faint);margin-top:6px;line-height:1.45}
/* GitHub 자동 추가 컨트롤 */
.gh-import{margin:-6px 0 18px;padding:13px 14px;border:1px solid var(--divider);border-radius:11px;background:var(--card-bg)}
.gh-import-head{display:flex;align-items:center;justify-content:space-between;gap:8px}
.gh-import-title{font-size:12.5px;font-weight:600;color:var(--text-light)}
.gh-import-btn{height:30px;padding:0 14px;border-radius:8px;font-size:12.5px;font-weight:600;background:#4A4A4A;color:#fff;flex-shrink:0}
.gh-import-btn:hover{background:#2E2E2E}
.gh-import-status{font-size:11.5px;color:var(--text-faint);margin-top:9px;line-height:1.45}
.gh-clear{margin-top:8px;font-size:11.5px;color:var(--text-faint);text-decoration:underline}
.gh-clear:hover{color:#eb5747}
.inp{
  width:100%;background:var(--input-bg);border:1px solid transparent;border-radius:8px;
  padding:11px 13px;font-size:14.5px;color:var(--text);transition:border .12s,background .12s;
}
.inp:focus{outline:none;border-color:#4A4A4A;background:var(--bg);box-shadow:0 0 0 3px rgba(74,74,74,.14)}
textarea.inp{resize:none;min-height:72px;max-height:320px;line-height:1.55;overflow-y:auto;transition:height .1s}
.inp-row{display:flex;gap:12px}
.inp-row .field{flex:1;margin-bottom:0}

.emoji-pick{display:flex;flex-wrap:wrap;gap:6px}
.emoji-pick button{width:42px;height:42px;border-radius:9px;font-size:22px;background:var(--input-bg);transition:transform .1s,background .12s}
.emoji-pick button:hover{background:var(--hover)}
.emoji-pick button.on{background:#4A4A4A22;box-shadow:inset 0 0 0 2px #4A4A4A;transform:scale(1.05)}

/* icon control (emoji grid + image upload) */
.icon-ctrl{display:flex;gap:14px;align-items:flex-start}
.ic-left{display:flex;flex-direction:column;gap:8px;flex-shrink:0;width:72px}
.ic-preview{width:72px;height:72px;flex:none;border-radius:14px;display:grid;place-items:center;font-size:40px;
  background:var(--input-bg);overflow:hidden}
.ic-preview.img{background:transparent}
.ic-preview img{width:100%;height:100%;object-fit:cover}
.ic-upload-sq{width:72px;height:72px;flex-shrink:0;border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  background:var(--input-bg);border:1.5px dashed var(--divider);color:var(--text-faint);transition:.12s}
.ic-upload-sq:hover{border-color:#4A4A4A;color:#4A4A4A;background:rgba(74,74,74,.05)}
.ic-upload-sq svg{width:19px;height:19px}
.ic-upload-sq span{font-size:11px;font-weight:600}
.ic-right{flex:1;min-width:0;display:flex;flex-direction:column;gap:8px}
.ic-cats{display:flex;gap:3px;flex-shrink:0}
.ic-cat{flex:1;text-align:center;font-size:11.5px;padding:5px 4px;border-radius:6px;color:var(--text-faint);transition:.12s;white-space:nowrap}
.ic-cat:hover{background:var(--hover);color:var(--text)}
.ic-cat.on{background:var(--hover);color:var(--text);font-weight:600}
.ic-grid{display:grid;grid-template-columns:repeat(8,minmax(0,1fr));gap:3px;flex:1;min-height:80px;max-height:160px;overflow-y:auto;overflow-x:hidden;padding:2px}
.ic-emoji{aspect-ratio:1;min-width:0;overflow:hidden;border-radius:7px;font-size:19px;display:grid;place-items:center;transition:.1s}
.ic-emoji:hover{background:var(--hover)}
.ic-emoji.on{background:#4A4A4A22;box-shadow:inset 0 0 0 2px #4A4A4A}
.ic-remove{font-size:11.5px;color:var(--text-faint);height:24px;text-align:center}
.ic-remove:hover{color:#eb5747}
.ic-modes{width:100%;margin-bottom:11px}
.ic-modes button{flex:1}
.ic-preview .circ,.ic-preview.circ img{border-radius:50%}
.ic-preview .ic-ph{font-size:30px;color:var(--text-faint)}
.ic-none-msg{font-size:12.5px;color:var(--text-faint);background:var(--input-bg);border-radius:9px;padding:14px 14px;line-height:1.5}
/* 사진 모드 — 오른쪽 컨트롤 높이를 80px 사진 박스와 동일하게 */
.ic-photo{display:flex;gap:14px;align-items:stretch}
.ic-photo-box{width:80px;height:80px;flex:none;border-radius:14px;background:var(--input-bg);border:1.5px dashed var(--divider);
  display:grid;place-items:center;overflow:hidden;color:var(--text-faint)}
.ic-photo-box.has{border:none;background:transparent}
.ic-photo-box img{width:100%;height:100%;object-fit:cover;border-radius:14px}
.ic-photo-box img.circ{border-radius:50%}
.ic-photo-box .ic-ph svg{width:30px;height:30px}
.ic-photo-row{flex:1;min-width:0;display:flex;align-items:stretch;gap:8px}
.ic-attach{flex-shrink:0;height:auto;padding:0 16px;border-radius:10px;font-size:13px;font-weight:600;
  background:var(--input-bg);color:var(--text-light);transition:.12s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.ic-attach:hover{background:var(--active-bg);color:#4A4A4A}
.ic-attach::before{content:"↑";font-size:13px;font-weight:700}
.ic-shape-seg{flex:1;min-width:0;height:auto;flex-direction:row;align-items:stretch;padding:4px}
.ic-shape-seg button{flex:1;white-space:nowrap;border-radius:9px;height:auto}
.ic-rm-inline{flex-shrink:0;width:40px;border-radius:10px;display:grid;place-items:center;color:var(--text-faint);background:var(--input-bg);transition:.12s}
.ic-rm-inline svg{width:16px;height:16px}
.ic-rm-inline:hover{background:#eb574722;color:#eb5747}
.ic-rm-inline.off{opacity:.4;cursor:default}
.ic-rm-inline.off:hover{background:var(--input-bg);color:var(--text-faint)}

/* repeater */
.rep-card{border:1px solid var(--divider);border-radius:11px;padding:16px;margin-bottom:14px;background:var(--card-bg);position:relative;transition:border .12s}
.rep-card:hover{border-color:var(--text-faint)}
.rep-head{display:flex;align-items:center;gap:4px;margin-bottom:13px}
.rep-badge{font-size:11.5px;font-weight:600;color:var(--text-faint);letter-spacing:.03em;text-transform:uppercase;flex:1}
.rep-del{width:28px;height:28px;border-radius:6px;display:grid;place-items:center;color:var(--text-faint);transition:.12s;flex-shrink:0}
.rep-del:hover{background:#eb574722;color:#eb5747}
.rep-del svg{width:15px;height:15px}
.rep-mv{width:26px;height:26px;border-radius:5px;display:grid;place-items:center;color:var(--text-faint);transition:.12s;flex-shrink:0}
.rep-mv svg{width:14px;height:14px}
.rep-mv:hover:not([disabled]){background:var(--hover);color:var(--text)}
.rep-mv[disabled]{opacity:.3;cursor:default}
.rep-add{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border:1.5px dashed var(--divider);border-radius:11px;
  color:var(--text-light);font-size:14px;font-weight:500;transition:.12s}
.rep-add:hover{border-color:#4A4A4A;color:#4A4A4A;background:rgba(74,74,74,.05)}
.rep-add svg{width:16px;height:16px}
.rep-empty{text-align:center;color:var(--text-faint);font-size:13.5px;padding:6px 0 18px}
/* 기간 선택 위젯 */
.rep-flabel{display:block;font-size:11.5px;font-weight:600;color:var(--text-faint);margin-bottom:6px}
.period-pick{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.period-inp{flex:1;min-width:0;width:auto;padding:9px 10px;font-size:13.5px;color-scheme:light}
[data-mode="dark"] .period-inp{color-scheme:dark}
.period-sep{color:var(--text-faint);flex-shrink:0}
.period-now{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:var(--text-light);flex-shrink:0;cursor:pointer;white-space:nowrap}
.period-now input{width:15px;height:15px;accent-color:#4A4A4A;cursor:pointer}

/* step nav */
.step-nav{display:flex;align-items:center;gap:10px;padding:14px 22px;border-top:1px solid var(--divider);background:var(--bg)}
.step-nav .spacer{flex:1}
.nbtn{height:38px;padding:0 18px;border-radius:8px;font-size:14px;font-weight:600;display:inline-flex;align-items:center;gap:7px;transition:.12s}
.nbtn.ghost{color:var(--text-light)}
.nbtn.ghost:hover{background:var(--hover);color:var(--text)}
.nbtn.solid{background:#4A4A4A;color:#fff}
.nbtn.solid:hover{background:#2E2E2E}
.nbtn.solid:disabled{opacity:.4;cursor:default}
.nbtn svg{width:15px;height:15px}

/* finish step actions */
.finish-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.fin-act{display:flex;align-items:center;gap:12px;padding:13px 14px;border:1px solid var(--divider);border-radius:11px;text-align:left;width:100%;transition:.12s}
.fin-act:hover{border-color:#4A4A4A;background:rgba(74,74,74,.04)}
.fin-ico{width:36px;height:36px;flex-shrink:0;border-radius:9px;display:grid;place-items:center;font-size:17px;background:var(--input-bg)}
.fin-txt b{display:block;font-size:13.5px;font-weight:600;margin-bottom:2px}
.fin-txt span{font-size:11.5px;color:var(--text-faint);line-height:1.35}

/* paste guide modal */
.paste-modal-bg{position:fixed;inset:0;z-index:280;background:rgba(15,15,15,.45);display:grid;place-items:center;
  opacity:0;transition:opacity .18s;padding:20px}
.paste-modal-bg.on{opacity:1}
.paste-modal{width:100%;max-width:380px;background:var(--menu-bg);border:1px solid var(--divider);border-radius:14px;
  box-shadow:var(--shadow);padding:22px;transform:translateY(8px) scale(.98);transition:transform .18s}
.paste-modal-bg.on .paste-modal{transform:none}
.pm-title{font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px;margin-bottom:5px}
.pm-sub{font-size:12.5px;color:var(--text-faint);line-height:1.5;margin-bottom:16px}
.pm-list{display:flex;flex-direction:column;gap:2px;margin-bottom:18px}
.pm-item{display:flex;gap:10px;align-items:flex-start;padding:8px 9px;border-radius:8px;cursor:pointer;transition:background .12s}
.pm-item:hover{background:var(--hover)}
.pm-check{width:18px;height:18px;flex-shrink:0;margin-top:1px;border:1.5px solid var(--text-faint);border-radius:5px;
  display:grid;place-items:center;font-size:11px;color:#fff;transition:.12s}
.pm-item.done .pm-check{background:#4A4A4A;border-color:#4A4A4A}
.pm-text{font-size:13px;line-height:1.45}
.pm-text b{font-weight:600}
.pm-item.done .pm-text{color:var(--text-faint);text-decoration:line-through}
.pm-actions{display:flex;gap:8px;justify-content:flex-end}
.pm-btn{height:36px;padding:0 16px;border-radius:8px;font-size:13.5px;font-weight:600;transition:.12s}
.pm-btn.ghost{color:var(--text-light)}
.pm-btn.ghost:hover{background:var(--hover);color:var(--text)}
.pm-btn.solid{background:#4A4A4A;color:#fff}
.pm-btn.solid:hover{background:#2E2E2E}

/* template gallery */
.tg-bg{position:fixed;inset:0;z-index:280;background:rgba(15,15,15,.5);display:grid;place-items:center;padding:24px;opacity:0;transition:opacity .18s}
.tg-bg.on{opacity:1}
.tg-modal{width:100%;max-width:780px;max-height:86vh;display:flex;flex-direction:column;background:var(--menu-bg);
  border:1px solid var(--divider);border-radius:16px;box-shadow:var(--shadow);overflow:hidden;transform:translateY(8px) scale(.99);transition:transform .18s}
.tg-bg.on .tg-modal{transform:none}
.tg-head{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid var(--divider)}
.tg-title{font-size:16px;font-weight:700}
.tg-head>span:nth-child(2){flex:1}
.tg-close{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:var(--text-faint);transition:.12s}
.tg-close:hover{background:var(--hover);color:var(--text)}
.tg-close svg{width:18px;height:18px}
.tg-grid{padding:18px 20px;overflow-y:auto;display:grid;grid-template-columns:repeat(3,1fr);gap:13px}
.tg-card.on{border-color:#4A4A4A;box-shadow:0 0 0 1px #4A4A4A}

/* ===== STYLE PANEL (sidebar) ===== */
.sp-sec{margin-bottom:24px}
.sp-sec-head{display:flex;align-items:baseline;gap:7px;margin-bottom:11px}
.sp-sec-title{font-size:12.5px;font-weight:700;letter-spacing:.02em}
.sp-sec-desc{font-size:11px;color:var(--text-faint)}
.sp-preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sp-card{display:flex;flex-direction:column;border:1px solid var(--divider);border-radius:11px;overflow:hidden;
  text-align:left;transition:.13s;background:var(--bg)}
.sp-card:hover{border-color:#4A4A4A;transform:translateY(-2px);box-shadow:0 6px 16px rgba(15,15,15,.08)}
.sp-card.on{border-color:#4A4A4A}
.sp-thumb{height:54px;display:flex;align-items:flex-end;padding:8px}
.sp-thumb .e{font-size:21px;filter:drop-shadow(0 2px 4px rgba(0,0,0,.22))}
.sp-card-body{padding:8px 10px 10px}
.sp-card-name{font-size:12.5px;font-weight:700;margin-bottom:2px}
.sp-card-desc{font-size:10.5px;color:var(--text-faint);line-height:1.35}
.sp-ctrl{margin-bottom:16px}
.sp-ctrl-label{display:block;font-size:11.5px;font-weight:600;color:var(--text-light);margin-bottom:7px}
.sp-divider{height:1px;background:var(--divider);margin:6px 0 20px}
/* 포인트 컬러 */
.accent-pick{display:flex;flex-wrap:wrap;gap:7px;align-items:center}
.acc-sw{width:28px;height:28px;border-radius:7px;border:2px solid var(--divider);cursor:pointer;position:relative;transition:.12s;flex-shrink:0;padding:0}
.acc-sw:hover{transform:translateY(-1px)}
.acc-sw.on{border-color:#4A4A4A;box-shadow:none}
.acc-auto{width:auto;height:28px;padding:0 11px;font-size:11.5px;font-weight:600;color:var(--text-light);background:var(--input-bg);border-color:transparent}
.acc-auto.on{color:#4A4A4A}
.acc-custom{display:grid;place-items:center;background:var(--input-bg);overflow:hidden}
.acc-custom .acc-plus{font-size:14px;color:var(--text-faint);line-height:1}
.acc-custom.on .acc-plus{display:none}
.acc-custom input[type=color]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;border:none;padding:0;margin:0}
.accent-hint{font-size:10.5px;color:var(--text-faint);margin-top:7px}
/* 섹션 순서 */
.sec-order{display:flex;flex-direction:column;gap:5px}
.sec-order-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid var(--divider);border-radius:8px;background:var(--bg)}
.sec-order-name{flex:1;font-size:12.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sec-order-btns{display:flex;gap:2px;flex-shrink:0}
.sec-order-btns button{width:24px;height:24px;border-radius:5px;font-size:13px;color:var(--text-faint);display:grid;place-items:center;transition:.12s}
.sec-order-btns button:hover:not([disabled]){background:var(--hover);color:var(--text)}
.sec-order-btns button[disabled]{opacity:.25;cursor:default}
.tg-card{display:flex;flex-direction:column;border:1px solid var(--divider);border-radius:12px;overflow:hidden;
  text-align:left;transition:.14s;background:var(--bg)}
.tg-card:hover{border-color:#4A4A4A;transform:translateY(-2px);box-shadow:0 8px 22px rgba(15,15,15,.1)}
.tg-thumb{height:70px;display:flex;align-items:flex-end;padding:10px}
.tg-emoji{font-size:26px;filter:drop-shadow(0 2px 5px rgba(0,0,0,.25))}
.tg-card-body{padding:11px 12px 13px;display:flex;flex-direction:column;flex:1}
.tg-card-name{font-size:13.5px;font-weight:700;margin-bottom:3px}
.tg-card-desc{font-size:11.5px;color:var(--text-faint);line-height:1.45;margin-bottom:9px;flex:1}
.tg-badges{display:flex;gap:5px;flex-wrap:wrap}
.tg-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:4px;background:var(--input-bg);color:var(--text-light)}
.tg-badge-accent{background:#4A4A4A18;color:#4A4A4A}
@media(max-width:640px){.tg-grid{grid-template-columns:1fr 1fr}}

/* notion guide (finish step) */
.notion-guide{border:1px solid var(--divider);border-radius:12px;padding:16px;margin-bottom:18px;background:var(--card-bg)}
.ng-title{font-size:14px;font-weight:700;margin-bottom:3px;display:flex;align-items:center;gap:7px}
.ng-sub{font-size:12px;color:var(--text-faint);line-height:1.5;margin-bottom:14px}
.ng-method{display:flex;gap:12px;padding:12px 0;border-top:1px solid var(--divider)}
.ng-num{width:24px;height:24px;flex-shrink:0;border-radius:50%;background:#4A4A4A;color:#fff;font-size:12px;font-weight:700;display:grid;place-items:center}
.ng-body{flex:1;min-width:0}
.ng-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px}
.ng-name{font-size:13.5px;font-weight:600}
.ng-badge{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:5px;letter-spacing:.02em}
.ng-badge.best{background:#0BA36022;color:#0BA360}
.ng-badge.fast{background:#4A4A4A22;color:#4A4A4A}
.ng-badge.easy{background:var(--input-bg);color:var(--text-light)}
.ng-steps{font-size:12px;color:var(--text-light);line-height:1.6}
.ng-steps b{color:var(--text);font-weight:600}
.ng-act{margin-top:8px;height:28px;padding:0 12px;border-radius:7px;font-size:12px;font-weight:600;background:var(--input-bg);color:var(--text-light);transition:.12s}
.ng-act:hover{background:var(--active-bg);color:#4A4A4A}

/* tools picker */
.tools-cat-section{margin-bottom:18px}
.tools-cat-head{font-size:11.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text-faint);margin-bottom:8px}
.tools-chips{display:flex;flex-wrap:wrap;gap:6px}
.tool-chip{height:28px;padding:0 11px;border-radius:6px;font-size:12.5px;font-weight:500;
  background:var(--input-bg);color:var(--text-faint);transition:.12s;border:1.5px solid transparent}
.tool-chip:hover{background:var(--active-bg);color:#4A4A4A}
.tool-chip.on{background:#4A4A4A15;color:#4A4A4A;border-color:rgba(74,74,74,.4)}

/* np-tools (preview) */
.np-tools-cat{margin-bottom:14px}
.np-tools-cat-label{font-size:11.5px;font-weight:700;letter-spacing:.05em;text-transform:uppercase;color:var(--text-faint);display:block;margin-bottom:7px}

/* ============ PREVIEW PANE ============ */
.preview-pane{flex:1;overflow-y:auto;background:var(--canvas-bg);position:relative}
.pv-toolbar{position:sticky;top:0;z-index:5;display:flex;align-items:center;gap:8px;padding:7px 16px;
  font-size:12px;color:var(--text-faint);background:var(--canvas-bg);border-bottom:1px solid var(--divider)}
.pv-dot{width:7px;height:7px;border-radius:50%;background:#0BA360;flex-shrink:0}
.pv-hint{margin-left:auto;position:relative}
.pv-hint-ico{width:28px;height:28px;border-radius:7px;display:grid;place-items:center;color:var(--text-faint);transition:.12s;cursor:default}
.pv-hint-ico:hover{background:var(--hover);color:var(--text)}
.pv-hint-ico svg{width:15px;height:15px}
.pv-hint-tooltip{position:absolute;right:0;top:34px;background:var(--menu-bg);border:1px solid var(--divider);
  border-radius:8px;box-shadow:var(--shadow);padding:8px 12px;font-size:12px;color:var(--text-light);
  white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;z-index:10}
.pv-hint:hover .pv-hint-tooltip{opacity:1}
.pv-hint kbd{font-family:var(--font-mono);font-size:10.5px;background:var(--input-bg);border-radius:4px;padding:2px 5px}

/* ============ GUIDE (자동 입력) OVERLAY ============ */
#guide-overlay{position:fixed;inset:0;z-index:150;background:var(--bg);display:flex;flex-direction:column}
.guide-top{display:flex;align-items:center;gap:16px;padding:18px 26px}
.guide-brand{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px}
.guide-brand .logo{width:24px;height:24px;border-radius:6px;display:grid;place-items:center;font-size:13px;background:var(--input-bg)}
.guide-top .gbar{flex:1;height:4px;border-radius:4px;background:var(--input-bg);overflow:hidden;max-width:520px;margin:0 auto}
.guide-top .gfill{height:100%;background:#4A4A4A;border-radius:4px;transition:width .35s cubic-bezier(.4,0,.2,1)}
.guide-count{font-size:12.5px;color:var(--text-faint);font-variant-numeric:tabular-nums;min-width:54px;text-align:right}
.guide-close{width:34px;height:34px;border-radius:8px;display:grid;place-items:center;color:var(--text-faint);transition:.12s}
.guide-close:hover{background:var(--hover);color:var(--text)}
.guide-close svg{width:19px;height:19px}

.guide-body{flex:1;overflow-y:auto;display:flex;flex-direction:column;align-items:center;justify-content:flex-start}
.guide-card{width:100%;max-width:620px;margin:auto;padding:40px 28px 60px;animation:gIn .4s cubic-bezier(.16,1,.3,1)}
@keyframes gIn{from{transform:translateY(14px)}to{transform:none}}
.guide-kicker{font-size:13px;font-weight:600;letter-spacing:.04em;color:#4A4A4A;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.guide-kicker .gk-num{background:#4A4A4A;color:#fff;border-radius:5px;padding:1px 7px;font-size:12px}
.guide-q{font-size:32px;font-weight:800;letter-spacing:-.025em;line-height:1.2;margin-bottom:10px;text-wrap:pretty}
.guide-hint{font-size:15px;color:var(--text-light);line-height:1.5;margin-bottom:28px}
.guide-input{width:100%;background:transparent;border:none;border-bottom:2px solid var(--divider);
  padding:10px 2px;font-size:24px;font-weight:500;color:var(--text);transition:border .15s}
.guide-input::placeholder{color:var(--text-faint);font-weight:400}
.guide-input:focus{outline:none;border-color:#4A4A4A}
textarea.guide-input{border:1.5px solid var(--divider);border-radius:12px;padding:16px;font-size:18px;font-weight:400;line-height:1.6;min-height:140px;resize:vertical}
textarea.guide-input:focus{border-color:#4A4A4A}
.guide-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px}
.guide-enter-hint{font-size:12.5px;color:var(--text-faint);margin-top:16px;display:flex;align-items:center;gap:7px}
.guide-enter-hint kbd{font-family:var(--font-mono);font-size:11px;background:var(--input-bg);border-radius:4px;padding:2px 6px}

.guide-nav{display:flex;align-items:center;gap:12px;padding:18px 26px;border-top:1px solid var(--divider);justify-content:center}
.guide-nav-inner{width:100%;max-width:620px;display:flex;align-items:center;gap:12px}
.gbtn{height:44px;padding:0 22px;border-radius:10px;font-size:15px;font-weight:600;display:inline-flex;align-items:center;gap:8px;transition:.12s}
.gbtn.solid{background:#4A4A4A;color:#fff}
.gbtn.solid:hover{background:#2E2E2E}
.gbtn.ghost{color:var(--text-light)}
.gbtn.ghost:hover{background:var(--hover);color:var(--text)}
.gbtn svg{width:16px;height:16px}
.guide-nav .sp{flex:1}

/* section card */
.guide-sec-list{display:flex;flex-direction:column;gap:10px;margin-bottom:16px}
.guide-rep-host .rep-card{background:var(--card-bg)}
.guide-intro-emoji{font-size:60px;margin-bottom:18px}
.guide-done-emoji{font-size:64px;margin-bottom:18px}
.guide-intro-list{display:flex;flex-direction:column;gap:9px;margin:22px 0 4px}
.guide-intro-list li{display:flex;align-items:center;gap:11px;font-size:15px;color:var(--text-light);list-style:none}
.guide-intro-list .n{width:24px;height:24px;border-radius:50%;border:1px solid var(--divider);display:grid;place-items:center;font-size:12px;color:var(--text-faint);flex-shrink:0}

/* ============ COVER EDITOR (세로 풀-폭) ============ */
.ce-banner{width:100%;height:58px;border-radius:10px;border:1px solid var(--divider);margin-bottom:10px;
  background-size:cover!important;background-position:center!important}
.ce-banner.none{border-style:dashed;display:grid;place-items:center}
.ce-banner.none span{font-size:12px;font-weight:600;color:var(--text-faint)}
.ce-tabs{display:flex;gap:2px;margin-bottom:11px;background:var(--input-bg);border-radius:8px;padding:3px}
.ce-tab{flex:1;height:28px;border-radius:6px;font-size:11.5px;font-weight:600;color:var(--text-faint);transition:.12s;white-space:nowrap}
.ce-tab.on{background:var(--bg);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.1)}
[data-mode="dark"] .ce-tab.on{background:rgba(255,255,255,.12)}
.ce-grid{display:grid;gap:7px}
.ce-grid.g8{grid-template-columns:repeat(8,1fr)}
.ce-grid.g6{grid-template-columns:repeat(6,1fr)}
.ce-sw{height:30px;border-radius:7px;border:2px solid transparent;transition:.1s;cursor:pointer}
.ce-sw:hover{transform:scale(1.07)}
.ce-sw.on{border-color:#4A4A4A;box-shadow:0 0 0 1px #4A4A4A}
.ce-color-row{display:flex;align-items:center;gap:9px;margin-top:10px;padding-top:10px;border-top:1px solid var(--divider)}
.ce-color-label{font-size:12px;font-weight:600;color:var(--text-light);flex-shrink:0}
.ce-color-inp{width:34px;height:30px;border:1px solid var(--divider);border-radius:7px;cursor:pointer;padding:2px;background:none}
.ce-color-hex{font-size:12.5px;color:var(--text-light);font-family:var(--font-mono)}
/* 이미지 업로드 — 사진 첨부와 동일한 룩 */
.ce-img-row{display:flex;align-items:center;gap:9px}
.ce-img-up{height:34px;padding:0 16px;border-radius:8px;font-size:13px;font-weight:600;
  background:var(--input-bg);color:var(--text-light);transition:.12s;display:inline-flex;align-items:center;gap:6px}
.ce-img-up::before{content:"↑";font-weight:700}
.ce-img-up:hover{background:var(--active-bg);color:#4A4A4A}
.ce-img-rm{font-size:12.5px;font-weight:600;color:var(--text-faint);transition:.12s}
.ce-img-rm:hover{color:#eb5747}
.ce-img-hint{font-size:11.5px;color:var(--text-faint);margin-top:9px}

/* ============ SKILL SUGGESTIONS ============ */
.skill-sugg-wrap{margin-top:14px}
.skill-sugg-label{font-size:11.5px;color:var(--text-faint);margin-bottom:8px;display:block}
.skill-sugg-chips{display:flex;flex-wrap:wrap;gap:5px}
.skill-chip{height:27px;padding:0 10px;border-radius:6px;font-size:12.5px;font-weight:500;
  background:var(--input-bg);color:var(--text-faint);transition:.12s;white-space:nowrap}
.skill-chip:hover{background:var(--active-bg);color:#4A4A4A}
.skill-more{background:transparent;border:1px dashed var(--divider)}
.skill-more:hover{border-color:#4A4A4A;background:rgba(74,74,74,.05);color:#4A4A4A}

/* ============ CUSTOM SECTIONS ============ */
.cs-head-row{display:flex;gap:10px;align-items:center;margin-bottom:14px}
.cs-ico-btn{width:38px;height:38px;border-radius:9px;font-size:22px;background:var(--input-bg);
  display:grid;place-items:center;flex-shrink:0;transition:.12s;position:relative}
.cs-ico-btn:hover{background:var(--hover)}
.cs-title-inp{flex:1;background:transparent;border:none;border-bottom:1.5px solid var(--divider);
  padding:5px 2px;font-size:14.5px;font-weight:700;color:var(--text);transition:border .12s}
.cs-title-inp:focus{outline:none;border-bottom-color:#4A4A4A}
.emoji-mini-drop{position:absolute;top:42px;left:0;z-index:80;background:var(--menu-bg);
  border:1px solid var(--divider);border-radius:10px;box-shadow:var(--shadow);padding:8px;width:230px}
.emoji-mini-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:3px}
.emoji-mini-btn{aspect-ratio:1;border-radius:6px;font-size:19px;display:grid;place-items:center;transition:.1s}
.emoji-mini-btn:hover{background:var(--hover)}

/* ============ LAYOUT PICKER ============ */
.layout-pick{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.lay-opt{display:flex;flex-direction:column;align-items:center;gap:7px;padding:10px 6px;border:1.5px solid var(--divider);
  border-radius:10px;transition:.12s;background:var(--bg)}
.lay-opt:hover{border-color:var(--text-faint)}
.lay-opt.on{border-color:#4A4A4A}
.lay-thumb{width:100%;height:42px;border-radius:6px;background:var(--input-bg);position:relative;overflow:hidden}
.lay-name{font-size:12px;font-weight:600;color:var(--text-light)}
.lay-opt.on .lay-name{color:#4A4A4A}
/* thumbnail diagrams */
.lt-notion::before{content:"";position:absolute;inset:6px;border-radius:3px;
  background:linear-gradient(var(--text-faint) 0 0) top/100% 9px no-repeat,
    linear-gradient(var(--text-faint) 0 0) 0 16px/60% 3px no-repeat,
    linear-gradient(var(--text-faint) 0 0) 0 24px/100% 3px no-repeat,
    linear-gradient(var(--text-faint) 0 0) 0 30px/100% 3px no-repeat;opacity:.5}
.lt-sidebar::before{content:"";position:absolute;inset:6px;border-radius:3px;
  background:linear-gradient(var(--text-faint) 0 0) 0 0/34% 100% no-repeat;opacity:.5}
.lt-sidebar::after{content:"";position:absolute;top:6px;right:6px;bottom:6px;width:56%;border-radius:3px;
  background:linear-gradient(var(--text-faint) 0 0) 0 2px/100% 3px no-repeat,
    linear-gradient(var(--text-faint) 0 0) 0 10px/100% 3px no-repeat,
    linear-gradient(var(--text-faint) 0 0) 0 18px/80% 3px no-repeat;opacity:.5}
.lt-minimal::before{content:"";position:absolute;inset:6px;border-radius:3px;
  background:linear-gradient(var(--text-faint) 0 0) 50% 2px/40% 5px no-repeat,
    linear-gradient(var(--text-faint) 0 0) 50% 12px/64% 3px no-repeat,
    linear-gradient(var(--text-faint) 0 0) 50% 20px/64% 3px no-repeat;opacity:.5}


/* ============ STYLE PICKER ============ */
.style-pick{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sty-opt{display:flex;flex-direction:column;align-items:flex-start;gap:2px;padding:9px 11px;border:1.5px solid var(--divider);
  border-radius:10px;transition:.12s;background:var(--bg);text-align:left;position:relative;overflow:hidden}
.sty-opt:hover{border-color:var(--text-faint)}
.sty-opt.on{border-color:#4A4A4A}
.sty-prev{width:100%;height:18px;border-radius:4px;margin-bottom:5px;position:relative;background:var(--input-bg);overflow:hidden}
.sty-name{font-size:12.5px;font-weight:700}
.sty-opt.on .sty-name{color:#4A4A4A}
.sty-desc{font-size:10.5px;color:var(--text-faint);line-height:1.3}
/* 스타일 미리보기 미니바 */
.sty-prev-classic .sty-prev::before{content:"";position:absolute;left:5px;top:5px;width:8px;height:8px;border-radius:2px;background:#FF9A8B}
.sty-prev-classic .sty-prev::after{content:"";position:absolute;left:17px;top:6px;width:40%;height:6px;border-radius:3px;background:var(--text-faint);opacity:.5}
.sty-prev-line .sty-prev::before{content:"";position:absolute;left:5px;right:5px;top:6px;height:2px;background:var(--text-faint);opacity:.45}
.sty-prev-line .sty-prev::after{content:"";position:absolute;left:5px;top:11px;width:30%;height:5px;border-radius:2px;border:1px solid var(--text-faint);opacity:.5}
.sty-prev-bold .sty-prev::before{content:"";position:absolute;left:5px;top:5px;width:50%;height:8px;border-radius:2px;background:#4A4A4A;opacity:.7}
.sty-prev-bold .sty-prev::after{content:"";position:absolute;left:5px;right:5px;top:14px;height:2px;background:#4A4A4A;opacity:.3}
.sty-prev-mono .sty-prev::before{content:"#";position:absolute;left:5px;top:2px;font-size:11px;font-family:monospace;color:#0BA360}
.sty-prev-mono .sty-prev::after{content:"";position:absolute;left:16px;top:6px;width:30%;height:5px;border-radius:2px;border:1px solid var(--text-faint);opacity:.5}

/* ============ THEME + FONT ROW ============ */
.theme-font-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.theme-font-row .seg{flex:1}
.theme-font-row .seg button{flex:1;font-size:12.5px}

/* ============ MOBILE TABS ============ */
.mob-tabs{display:none;border-bottom:1px solid var(--divider);background:var(--bg)}
.mt-btn{flex:1;height:42px;display:flex;align-items:center;justify-content:center;gap:6px;
  font-size:14px;font-weight:600;color:var(--text-faint);border-bottom:2px solid transparent;transition:.15s}
.mt-btn.on{color:#4A4A4A;border-bottom-color:#4A4A4A}
@media(max-width:767px){
  .mob-tabs{display:flex}
  .workspace{height:calc(100vh - 52px - 42px)!important;height:calc(100dvh - 52px - 42px)!important;flex-direction:column}
  .editor{width:100%!important;max-width:100%!important;min-width:0!important;border-right:none!important;flex-shrink:0}
  .preview-pane{flex:none!important;height:100%}
  .editor.mob-hidden,.preview-pane.mob-hidden{display:none!important}
  .brand .sub{display:none}
  /* 상단바 버튼: 아이콘만 표시(숨겼던 도우미·슬라이드도 아이콘으로 노출) */
  .tbtn.hide-sm{display:inline-flex}
  .topbar{gap:7px}
  .topbar .tbtn{font-size:0;gap:0;width:36px;padding:0;justify-content:center}
  .topbar .tbtn svg{width:18px;height:18px}
  .topbar .tbtn .chev{display:none}
  /* iOS 입력 자동확대 방지(폰트 16px 이상) */
  .inp,textarea.inp,.period-inp{font-size:16px}
  /* 터치 타깃 확대(권장 44px 근접) */
  .rep-mv{width:34px;height:34px}
  .rep-del{width:36px;height:36px}
  .sec-order-btns button{width:34px;height:34px}
  .chip{height:36px}
  .ed-tab{height:40px}
  /* 2단 입력칸 세로 스택 */
  .inp-row{flex-direction:column;gap:0}
  .inp-row .field{margin-bottom:14px}
  /* 이모지 그리드 손가락 친화(8→6열) */
  .ic-grid{grid-template-columns:repeat(6,minmax(0,1fr))}
  /* 제작자 카드 화면 넘침 방지 */
  .about-card{min-width:0;width:calc(100vw - 32px);max-width:300px}
}

/* ============ PRINT (PDF export) ============ */
@media print{
  @page{margin:0}   /* 브라우저 기본 머리글/바닥글(날짜·이름·URL) 억제 */
  .topbar,.editor,.pv-toolbar,.step-nav,.mob-tabs,.ed-resizer,#slides-overlay,#toast{display:none !important}
  .workspace{display:block;height:auto}
  .preview-pane{overflow:visible;height:auto;background:#fff;padding:0}
  body{overflow:visible;height:auto;background:#fff}
  .notion-page{max-width:none;padding:0}

<script id="app-js">
/* =====================================================================
   pofo — Notion-style Portfolio Builder  (single file, vanilla JS)

/* ---------- Theme / Page / Slide CSS (shared with standalone export) ---------- */
const THEME_CSS = `
:root{
  --font-sans:"Pretendard Variable","Pretendard",ui-sans-serif,-apple-system,"Segoe UI",system-ui,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
  --font-serif:"Nanum Myeongjo","Lyon Text","Iowan Old Style",Georgia,ui-serif,serif;
  --font-mono:"JetBrains Mono","SFMono-Regular",ui-monospace,Menlo,Consolas,monospace;
  --font-active:var(--font-sans);
  --bg:#ffffff; --text:rgb(55,53,47); --text-light:rgba(55,53,47,.65); --text-faint:rgba(55,53,47,.42);
  --divider:rgba(55,53,47,.09); --hover:rgba(55,53,47,.055); --active-bg:rgba(74,74,74,.12);
  --callout-bg:rgb(247,246,243); --sidebar-bg:rgb(251,251,250); --canvas-bg:#ffffff;
  --card-bg:#ffffff; --input-bg:rgba(55,53,47,.055); --menu-bg:#ffffff;
  --shadow:0 0 0 1px rgba(15,15,15,.05),0 8px 28px rgba(15,15,15,.14);
  --accent:#4A4A4A;
}
[data-mode="dark"]{
  --bg:rgb(25,25,25); --text:rgba(255,255,255,.9); --text-light:rgba(255,255,255,.62); --text-faint:rgba(255,255,255,.4);
  --divider:rgba(255,255,255,.11); --hover:rgba(255,255,255,.055); --active-bg:rgba(74,74,74,.22);
  --callout-bg:rgb(37,37,37); --sidebar-bg:rgb(32,32,32); --canvas-bg:rgb(25,25,25);
  --card-bg:rgb(32,32,32); --input-bg:rgba(255,255,255,.06); --menu-bg:rgb(37,37,37);
  --shadow:0 0 0 1px rgba(0,0,0,.4),0 10px 32px rgba(0,0,0,.5);
}
[data-font="sans"]{--font-active:var(--font-sans)}
[data-font="serif"]{--font-active:var(--font-serif)}
[data-font="mono"]{--font-active:var(--font-mono)}
`;

const PAGE_CSS = `
.notion-page{max-width:740px;margin:0 auto;padding:0 0 120px;font-family:var(--font-active)}
.np-cover{height:200px;width:100%;position:relative}
.np-body{padding:0 52px;position:relative}
.np-icon{font-size:74px;line-height:1;margin-top:-44px;margin-bottom:6px;position:relative;
  width:90px;height:90px;display:grid;place-items:center}
.np-icon-img{width:90px;height:90px;border-radius:18px;object-fit:cover;box-shadow:0 4px 14px rgba(15,15,15,.18)}
.np-icon-img.circ{border-radius:50%}
/* 아이콘 없음 — 제목이 커버 바로 아래 답답하지 않게 여백 */
.lay-notion.no-icon .np-body{padding-top:30px}
.lay-notion.no-icon .np-title,.lay-sidebar.no-icon .np-aside .np-title{margin-top:0}
/* 커버 없음 — 음수 마진 보정 + 상단 여백 */
.lay-notion.no-cover .np-body{padding-top:48px}
.lay-notion.no-cover .np-icon{margin-top:0}
.lay-minimal.no-cover .np-body{padding-top:46px}
.lay-sidebar.no-cover .np-sb-grid{padding-top:46px}
.lay-sidebar.no-cover .np-icon{margin-top:0}
.no-cover.no-icon .np-body{padding-top:40px}
.np-title{font-size:40px;font-weight:800;letter-spacing:-.025em;line-height:1.1;margin:6px 0 4px;word-break:break-word}
.np-title.faint{color:var(--text-faint);font-weight:600}
.np-tagline{font-size:16px;color:var(--text-light);line-height:1.5;margin-bottom:18px;font-style:italic}
.np-props{display:flex;flex-direction:column;gap:3px;margin-bottom:22px}
.np-prop{display:flex;align-items:center;gap:8px;font-size:14px;min-height:28px;border-radius:5px;padding:3px 6px;margin-left:-6px}
.np-prop .pk{display:flex;align-items:center;gap:7px;min-width:80px;width:100px;flex-shrink:0;color:var(--text-faint);font-size:13.5px}
.np-prop .pk .pemoji{font-size:14px;width:17px;text-align:center}
.np-prop .pv{color:var(--text);word-break:break-word}
.np-prop a.pv{color:#4A4A4A;text-decoration:none;border-bottom:1px solid rgba(74,74,74,.35)}
.np-callout{display:flex;gap:13px;background:var(--callout-bg);border-radius:9px;padding:16px 17px;margin:6px 0 30px;line-height:1.6;font-size:15px}
.np-callout .ce{font-size:19px;line-height:1.4}
.np-callout .ct{color:var(--text);white-space:pre-wrap}
.np-section{margin-bottom:30px}
.np-h{display:flex;align-items:center;gap:9px;font-size:21px;font-weight:700;letter-spacing:-.01em;margin-bottom:14px;padding-bottom:0}
.np-h .he{font-size:20px}
.np-tags{display:flex;flex-wrap:wrap;gap:7px}
.np-tag{font-size:13px;font-weight:500;padding:4px 10px;border-radius:6px;line-height:1.3}
.np-item{padding:14px 0;border-top:1px solid var(--divider)}
.np-item:first-child{border-top:none;padding-top:2px}
.np-item-top{display:grid;grid-template-columns:1fr auto;align-items:baseline;gap:6px 14px}
.np-item-top>div{min-width:0}
.np-item-title{font-size:16px;font-weight:700}
.np-item-sub{font-size:14px;color:var(--text-light);font-weight:500}
.np-emp-badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 7px;border-radius:5px;margin-left:7px;background:var(--input-bg);color:var(--text-light);vertical-align:middle}
.np-item-period{font-size:13px;color:var(--text-faint);white-space:nowrap;flex-shrink:0;font-variant-numeric:tabular-nums}
.np-item-desc{font-size:14.5px;color:var(--text-light);line-height:1.6;margin-top:6px;white-space:pre-wrap}
.np-item-role{font-size:13px;color:var(--text-faint);margin-top:4px;font-weight:500}
.np-item-result{display:flex;gap:8px;align-items:flex-start;margin-top:8px;font-size:14px;color:var(--text-light);line-height:1.55;white-space:pre-wrap}
.np-res-badge{flex-shrink:0;font-size:11px;font-weight:700;padding:2px 7px;border-radius:5px;background:var(--accent);color:#fff;opacity:.9;margin-top:1px}
.np-item-link{font-size:13.5px;color:#4A4A4A;text-decoration:none;display:inline-flex;align-items:center;gap:5px;margin-top:8px}
.np-links{display:flex;flex-wrap:wrap;gap:8px;margin-top:11px}
.np-link-btn{display:inline-flex;align-items:center;gap:7px;font-size:13px;font-weight:600;color:var(--text);
  background:var(--input-bg);padding:6px 12px;border-radius:7px;text-decoration:none;transition:background .12s,color .12s}
.np-link-btn:hover{background:var(--active-bg);color:#4A4A4A}
.np-lnk-ic{width:15px;height:15px}
.np-proj-tags{margin-top:9px}
/* GitHub 저장소 카드 */
.np-gh-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.np-gh-card{display:block;border:1px solid var(--divider);border-radius:10px;padding:14px 15px;transition:border .12s,box-shadow .12s;text-decoration:none;color:inherit}
.np-gh-card:hover{border-color:var(--accent);box-shadow:0 4px 14px rgba(15,15,15,.06)}
.np-gh-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:5px}
.np-gh-name{font-size:14.5px;font-weight:700;color:var(--accent);word-break:break-all}
.np-gh-star{flex-shrink:0;font-size:12px;font-weight:600;color:var(--text-faint)}
.np-gh-desc{font-size:13px;color:var(--text-light);line-height:1.5;margin-bottom:8px}
.np-gh-lang{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--text-faint)}
.np-gh-dot{width:9px;height:9px;border-radius:50%;background:var(--accent);display:inline-block}
@media(max-width:720px){.np-gh-grid{grid-template-columns:1fr}}
.np-empty-ph{color:var(--text-faint);font-size:14px;font-style:italic;padding:6px 0}
/* edit affordance */
.pv-edit{cursor:pointer;border-radius:6px;transition:background .12s,box-shadow .12s;position:relative}
.pv-edit:hover{background:var(--active-bg);box-shadow:0 0 0 6px var(--active-bg)}
.np-prop .pv-link{color:var(--accent);word-break:break-word}

/* ===== LAYOUT: SIDEBAR (정렬된 이력서형) ===== */
.lay-sidebar.notion-page{max-width:940px}

.lay-sidebar .np-aside .np-title{font-size:27px;margin:0 0 4px;line-height:1.15}

.lay-sidebar .np-aside .np-props{margin-bottom:0}

/* 오른쪽 본문: 같은 Y에서 시작, 항목 라인 정렬 */
.lay-sidebar .np-sb-main{min-width:0}
.lay-sidebar .np-sb-main>:first-child{margin-top:0}

const GRADIENTS = [
  {id:'sunset',  css:'linear-gradient(135deg,#FF9A8B 0%,#FF6A88 55%,#FF99AC 100%)'},
  {id:'ocean',   css:'linear-gradient(135deg,#48C6EF 0%,#6F86D6 100%)'},
  {id:'forest',  css:'linear-gradient(135deg,#0BA360 0%,#3CBA92 100%)'},
  {id:'lavender',css:'linear-gradient(135deg,#A18CD1 0%,#FBC2EB 100%)'},
  {id:'peach',   css:'linear-gradient(120deg,#FAD0C4 0%,#FFD1FF 100%)'},
  {id:'midnight',css:'linear-gradient(135deg,#2C3E50 0%,#4CA1AF 100%)'},
  {id:'amber',   css:'linear-gradient(120deg,#F6D365 0%,#FDA085 100%)'},
  {id:'graphite',css:'linear-gradient(135deg,#3A3A3A 0%,#0B0B0B 100%)'},
];
function gradientCss(id){ const g=GRADIENTS.find(x=>x.id===id); return g?g.css:GRADIENTS[0].css; }
/* background value usable in `background:` shorthand for both gradient and image covers */
function coverBg(st){
  if(st.theme&&st.theme.solidColor) return st.theme.solidColor;
  return (st.theme&&st.theme.coverImg)?`center/cover no-repeat url('${st.theme.coverImg}')`:gradientCss(st.theme&&st.theme.cover||'graphite');
}
/* 강조색 — 단색이면 그 색, 그라데이션이면 첫 색상 */
function accentHex(st){
  if(st.theme&&st.theme.accent) return st.theme.accent;
  if(st.theme&&st.theme.solidColor) return st.theme.solidColor;
  const m=String(gradientCss(st.theme&&st.theme.cover||'sunset')).match(/#([0-9a-f]{6})/i);
  return m?'#'+m[1]:'#4A4A4A';
}

/* downscale an uploaded image file → dataURL (keeps localStorage small) */
function loadImageFile(file,maxW,maxH,mime,cb){
  if(!file||!/^image\//.test(file.type)){ cb(null); return; }
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      let w=img.width,h=img.height;
      const r=Math.min(maxW/w,maxH/h,1); w=Math.round(w*r); h=Math.round(h*r);
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      let result;
      try{ result=c.toDataURL('image/webp',0.82); if(!result.startsWith('data:image/webp')) result=null; }catch(_){}
      if(!result) try{ result=c.toDataURL(mime,mime==='image/jpeg'?0.80:undefined); }catch(err){ result=e.target.result; }
      const sizeKB=Math.round((result||'').length*0.75/1024);
      if(sizeKB>600) setTimeout(()=>toast(`⚠️ 이미지 ${sizeKB}KB — 저장 공간에 영향을 줄 수 있어요`),100);
      cb(result);
    };
    img.onerror=()=>cb(null);
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
/* open a transient file picker */
function pickImage(maxW,maxH,mime,cb){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
  inp.onchange=()=>{ const f=inp.files&&inp.files[0]; if(f) loadImageFile(f,maxW,maxH,mime,cb); };
  inp.click();
}

function save(){
  try{localStorage.setItem(STORAGE_KEY,JSON.stringify({state,currentStep:currentStep,visited:[...visited]}));}
  catch(e){
    if(e.name==='QuotaExceededError'||e.name==='NS_ERROR_DOM_QUOTA_REACHED'){
      try{
        const s2=JSON.parse(JSON.stringify({state,currentStep,visited:[...visited]}));
        s2.state.profile.iconImg=''; s2.state.theme.coverImg='';
        localStorage.setItem(STORAGE_KEY,JSON.stringify(s2));
        toast('⚠️ 저장 용량 초과 — 이미지 제외 저장됨');
      }catch(_){ toast('⚠️ 저장 실패: 브라우저 저장 공간 부족'); }
    }
  }
}
function load(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY); if(!raw)return false;
    const d=JSON.parse(raw);
    if(d.state){
      state=Object.assign(emptyState(),d.state);
      state.theme=Object.assign({mode:'light',font:'sans',cover:'graphite',coverImg:'',solidColor:'',accent:'',layout:'notion',wide:true,style:'classic',noCover:false},d.state.theme||{});
      state.profile=Object.assign(emptyState().profile,d.state.profile||{});
      state.tools=Array.isArray(d.state.tools)?d.state.tools:[];
      state.custom=Array.isArray(d.state.custom)?d.state.custom:[];
      state.github=(d.state.github&&typeof d.state.github==='object')?{user:d.state.github.user||'',repos:Array.isArray(d.state.github.repos)?d.state.github.repos:[]}:{user:'',repos:[]};
      state.sectionOrder=Array.isArray(d.state.sectionOrder)?d.state.sectionOrder:['skills','tools','experience','projects','education'];
    }
    if(typeof d.currentStep==='number') currentStep=d.currentStep;
    if(Array.isArray(d.visited)) visited=new Set(d.visited);
    return true;
  }catch(e){return false;}
}

/* =========================================================
   PROGRESS CALC
   ========================================================= */
function completion(){
  const p=state.profile; let pts=0,total=9;
  if(p.name) pts++; if(p.role) pts++;
  if(p.email||p.github||p.website||p.location) pts++;
  if(state.about) pts++;
  if(state.skills.trim()) pts++;
  if(state.tools&&state.tools.length) pts++;
  if(state.experience.length) pts++;
  if(state.projects.length) pts++;
  if(state.education.length) pts++;
  return Math.round(pts/total*100);
}
function stepDone(i){
  const p=state.profile;
  switch(STEPS[i].id){
    case 'basics': return !!(p.name&&p.role);
    case 'contact': return !!(p.email||p.github||p.website||p.location||p.links.length);
    case 'about': return !!state.about.trim();
    case 'skills': return !!state.skills.trim();
    case 'tools': return !!(state.tools&&state.tools.length>0);
    case 'experience': return state.experience.length>0;
    case 'projects': return state.projects.length>0;
    case 'education': return state.education.length>0;
    case 'finish': return completion()>=80;
  }
  return false;
}

/* =========================================================
   RENDER: QUICK NAV + PROGRESS
   ========================================================= */
function updateProgress(){
  const pct=completion();
  document.getElementById('prog-step').textContent=`${currentStep+1} / ${STEPS.length}`;
  const nameEl=document.getElementById('prog-name');
  if(nameEl) nameEl.textContent=STEPS[currentStep]?.nav||'';
  document.getElementById('prog-pct').textContent=`${pct}% 완성`;
  const fill=document.getElementById('prog-fill'); fill.style.width=pct+'%';
  const bar=fill.parentElement; if(bar) bar.setAttribute('aria-valuenow',pct);
}
/* light update — refresh progress + header states WITHOUT rebuilding the open
   body (so typing never loses focus). Called from liveUpdate(). */
function renderNav(){
  updateProgress();
  document.querySelectorAll('#acc-scroll .acc-item[data-step]').forEach(item=>{
    const i=+item.dataset.step, done=stepDone(i), open=i===currentStep&&activeCustom<0&&!infoCollapsed;
    const num=item.querySelector('.qn-num');
    if(num) num.textContent=(done&&!open)?'✓':(i+1);
    item.classList.toggle('done',done);
    item.querySelector('.acc-head').classList.toggle('on',open);
  });
  document.getElementById('nav-prev').style.visibility=currentStep===0?'hidden':'visible';
  const nx=document.getElementById('nav-next'), sk=document.getElementById('nav-skip');
  if(currentStep===STEPS.length-1){ nx.classList.add('hidden'); sk.classList.add('hidden'); }
  else{ nx.classList.remove('hidden'); sk.classList.remove('hidden'); }
}

  scope.querySelectorAll('[data-emoji]').forEach(b=>b.onclick=()=>{ state.profile.emoji=b.dataset.emoji; renderStep(); liveUpdate(); });

const CUSTOM_ITEM_FIELDS=[{k:'title',ph:'항목 제목',w:1},{k:'sub',ph:'부제목 (선택)',w:1},{k:'period',ph:'날짜/기간 (선택)',full:true},{k:'desc',ph:'설명 (선택)',area:true,full:true}];
const CS_EMOJIS=['🏆','🎖️','📜','📌','⭐','💡','🔖','🧩','🎯','🌍','🗣️','🤝','📊','🔬','🎨','🏅','🥇','✅','📋','🌟','💼','🎓','🚀','💻','🔥','✨','📣','🎤'];

const SOLID_PRESETS=['#1a1a2e','#0f3460','#1b4332','#d62828','#e76f51','#6d6875'];

function renderCoverEdit(){
  const host=document.getElementById('cover-edit-ui'); if(!host) return;
  const th=state.theme;
  const isNone=!!th.noCover;
  const isSolid=!isNone&&!!th.solidColor, isImg=!isNone&&!!th.coverImg;
  const isGrad=!isNone&&!isSolid&&!isImg;
  const activeGrad=isGrad?th.cover:'';

  const previewBg=isNone?'transparent':coverBg({theme:th});
  const gradSwatches=GRADIENTS.map(g=>`<button class="ce-sw ${activeGrad===g.id?'on':''}" data-ceg="${g.id}" style="background:${g.css}" title="${g.id}"></button>`).join('');
  const solidSwatches=SOLID_PRESETS.map(c=>`<button class="ce-sw ${isSolid&&th.solidColor===c?'on':''}" data-ces="${c}" style="background:${c}" title="${c}"></button>`).join('');

  host.innerHTML=`
    <div class="ce">
      <div class="ce-banner ${isNone?'none':''}" style="background:${previewBg}">${isNone?'<span>커버 없음</span>':''}</div>
      <div class="ce-tabs">
        <button class="ce-tab ${isGrad?'on':''}" data-cetab="grad">그라데이션</button>
        <button class="ce-tab ${isSolid?'on':''}" data-cetab="solid">단색</button>
        <button class="ce-tab ${isImg?'on':''}" data-cetab="img">이미지</button>
        <button class="ce-tab ${isNone?'on':''}" data-cetab="none">없음</button>
      </div>
      <div class="ce-panel" id="ce-panel-grad" style="${isGrad?'':'display:none'}">
        <div class="ce-grid g8">${gradSwatches}</div>
      </div>
      <div class="ce-panel" id="ce-panel-solid" style="${isSolid?'':'display:none'}">
        <div class="ce-grid g6">${solidSwatches}</div>
        <div class="ce-color-row">
          <label class="ce-color-label">직접 입력</label>
          <input type="color" class="ce-color-inp" id="ce-color-inp" value="${isSolid?th.solidColor:'#4A4A4A'}">
          <span class="ce-color-hex" id="ce-color-hex">${isSolid?th.solidColor:'#4A4A4A'}</span>
        </div>
      </div>
      <div class="ce-panel" id="ce-panel-img" style="${isImg?'':'display:none'}">
        <div class="ce-img-row">
          <button class="ce-img-up" id="ce-img-up">${isImg?'이미지 변경':'이미지 업로드'}</button>
          ${isImg?`<button class="ce-img-rm" id="ce-img-rm">제거</button>`:''}
        </div>
        <div class="ce-img-hint">권장 1280 × 520px · 가로형 이미지</div>
      </div>
      <div class="ce-panel" id="ce-panel-none" style="${isNone?'':'display:none'}">
        <div class="ce-img-hint">커버 없이 제목부터 시작합니다. 미니멀한 룩에 어울려요.</div>
      </div>
    </div>`;

  // 탭 전환
  host.querySelectorAll('.ce-tab').forEach(b=>b.onclick=()=>{
    const tab=b.dataset.cetab;
    if(tab==='none'){ th.noCover=true; renderCoverEdit(); liveUpdate(); return; }
    // 커버 사용 탭으로 전환 → noCover 해제. 단, 선택값이 없는 grad는 기본값 보장
    th.noCover=false;
    if(tab==='grad'){ th.solidColor=''; th.coverImg=''; if(!th.cover) th.cover='sunset'; }
    host.querySelectorAll('.ce-tab').forEach(t=>t.classList.toggle('on',t.dataset.cetab===tab));
    host.querySelectorAll('.ce-panel').forEach(p=>p.style.display='none');
    document.getElementById(`ce-panel-${tab}`).style.display='';
    liveUpdate();
  });

  // 그라데이션 선택
  host.querySelectorAll('[data-ceg]').forEach(b=>b.onclick=()=>{
    th.noCover=false; th.solidColor=''; th.coverImg=''; th.cover=b.dataset.ceg;
    renderCoverEdit(); liveUpdate();
  });

  // 단색 프리셋
  host.querySelectorAll('[data-ces]').forEach(b=>b.onclick=()=>{
    th.noCover=false; th.solidColor=b.dataset.ces; th.coverImg='';
    renderCoverEdit(); liveUpdate();
  });

  // 단색 컬러피커
  const ci=document.getElementById('ce-color-inp');
  const ch=document.getElementById('ce-color-hex');
  if(ci){
    ci.addEventListener('input',()=>{
      th.noCover=false; th.solidColor=ci.value; th.coverImg='';
      if(ch) ch.textContent=ci.value;
      const bn=document.querySelector('.ce-banner'); if(bn){ bn.style.background=ci.value; bn.classList.remove('none'); bn.innerHTML=''; }
      liveUpdate();
    });
    ci.addEventListener('change',()=>{ renderCoverEdit(); liveUpdate(); });
  }

  // 이미지 업로드
  const upBtn=document.getElementById('ce-img-up');
  if(upBtn) upBtn.onclick=()=>pickImage(1280,520,'image/jpeg',d=>{
    if(d){ th.noCover=false; th.coverImg=d; th.solidColor=''; renderCoverEdit(); liveUpdate(); }
  });

  // 이미지 제거
  const rmBtn=document.getElementById('ce-img-rm');
  if(rmBtn) rmBtn.onclick=()=>{ th.coverImg=''; renderCoverEdit(); liveUpdate(); };
}

function buildCustomBody(ci){

    </div>
  </div>
  <div id="cs-rep-${ci}"></div>

function bindCustomBody(ci){
  const titleInp=document.getElementById(`cs-title-${ci}`);
  if(titleInp) titleInp.addEventListener('input',()=>{
    state.custom[ci].title=titleInp.value;
    const hd=document.querySelector(`[data-csec="${ci}"] .acc-title`);
    if(hd) hd.textContent=(state.custom[ci].emoji||'📌')+' '+(titleInp.value||'커스텀 섹션');
    liveUpdate();
  });
  const icoBtn=document.getElementById(`cs-ico-${ci}`);
  if(icoBtn) icoBtn.onclick=(e)=>{
    e.stopPropagation();
    const existing=icoBtn.parentElement.querySelector('.emoji-mini-drop');
    if(existing){ existing.remove(); return; }
    const drop=document.createElement('div'); drop.className='emoji-mini-drop';
    drop.innerHTML=`<div class="emoji-mini-grid">${CS_EMOJIS.map(em=>`<button class="emoji-mini-btn" data-ce="${em}">${em}</button>`).join('')}</div>`;
    icoBtn.parentElement.appendChild(drop);
    drop.querySelectorAll('[data-ce]').forEach(b=>b.onclick=(ev)=>{
      ev.stopPropagation();
      state.custom[ci].emoji=b.dataset.ce;
      icoBtn.textContent=b.dataset.ce;
      drop.remove();
      const hd=document.querySelector(`[data-csec="${ci}"] .acc-title`);
      if(hd) hd.textContent=b.dataset.ce+' '+(state.custom[ci].title||'커스텀 섹션');
      liveUpdate();
    });
    setTimeout(()=>document.addEventListener('click',function h(e2){if(!drop.contains(e2.target)&&e2.target!==icoBtn){drop.remove();document.removeEventListener('click',h);}},),0);
  };
  const delBtn=document.getElementById(`cs-del-${ci}`);
  if(delBtn) delBtn.onclick=()=>{
    if(!confirm(`"${state.custom[ci].title||'섹션'}"을(를) 삭제할까요?`)) return;
    state.custom.splice(ci,1); activeCustom=-1; renderStep(); liveUpdate();
  };
  const repHost=document.getElementById(`cs-rep-${ci}`);
  if(repHost) renderRepeater(`cs:${ci}`,repHost,CUSTOM_ITEM_FIELDS,'항목');
}

/* full rebuild of the accordion (step change / structural edits) */
function renderStep(){
  const host=document.getElementById('acc-scroll');
  // 표준 스텝 아이템
  let html=STEPS.map((s,i)=>{
    const open=i===currentStep&&activeCustom<0&&!infoCollapsed, done=stepDone(i);
    return `<div class="acc-item ${open?'open':''} ${done?'done':''}" data-step="${i}">
      <button class="acc-head ${open?'on':''}" data-step="${i}" aria-expanded="${open}">
        <span class="qn-num">${done&&!open?'✓':i+1}</span>
        <span class="acc-title">${s.emoji} ${s.nav}</span>
        <svg class="acc-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      ${open?`<div class="acc-body">${buildBody(i)}</div>`:''}
    </div>`;
  }).join('');
  // 커스텀 섹션 아이템
  html+=(state.custom||[]).map((cs,ci)=>{
    const open=activeCustom===ci;
    const hasCnt=(cs.items||[]).filter(it=>it.title).length;
    return `<div class="acc-item ${open?'open':''} ${hasCnt?'done':''}" data-csec="${ci}">
      <button class="acc-head ${open?'on':''}" data-csec="${ci}" aria-expanded="${open}">
        <span class="qn-num">${hasCnt||'+'}</span>
        <span class="acc-title">${esc(cs.emoji||'📌')} ${esc(cs.title||'커스텀 섹션')}</span>
        <svg class="acc-chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" aria-hidden="true"><path d="M6 9l6 6 6-6"/></svg>
      </button>
      ${open?`<div class="acc-body">${buildCustomBody(ci)}</div>`:''}
    </div>`;
  }).join('');
  html+=`<div class="acc-presets">
     <span class="acc-presets-label">섹션 추가</span>
     <button class="chip" data-csadd="🏅|자격증">＋ 자격증</button>
     <button class="chip" data-csadd="🏆|수상 경력">＋ 수상</button>
     <button class="chip" data-csadd="🌟|대외활동">＋ 대외활동</button>
     <button class="chip" data-csadd="🎓|교육 · 부트캠프">＋ 교육·부트캠프</button>
     <button class="chip" id="btn-add-cs">＋ 직접 추가</button>
   </div>`;
  host.innerHTML=html;
  // 표준 스텝 클릭
  host.querySelectorAll('.acc-head[data-step]').forEach(b=>b.onclick=()=>{
    const i=+b.dataset.step;
    if(i===currentStep && activeCustom<0 && !infoCollapsed){
      // 열린 항목 다시 클릭 → 접기
      infoCollapsed=true; renderStep(); renderNav(); save();
    } else {
      infoCollapsed=false; activeCustom=-1; goStep(i);
    }
  });
  // 커스텀 섹션 클릭
  host.querySelectorAll('.acc-head[data-csec]').forEach(b=>b.onclick=()=>{
    const ci=+b.dataset.csec;
    activeCustom=activeCustom===ci?-1:ci;
    renderStep();
    if(activeCustom>=0) scrollOpenToTop();
  });
  if(activeCustom>=0) bindCustomBody(activeCustom);
  // 섹션 추가 버튼
  const addCsBtn=document.getElementById('btn-add-cs');
  if(addCsBtn) addCsBtn.onclick=()=>{
    state.custom.push({id:'cs_'+Date.now(),emoji:'📌',title:'',items:[]});
    activeCustom=state.custom.length-1;
    renderStep(); liveUpdate();
    setTimeout(()=>{ const inp=document.getElementById(`cs-title-${activeCustom}`); if(inp) inp.focus(); },60);
  };
  // 빠른 섹션 프리셋 (자격증·수상·활동·교육)
  host.querySelectorAll('[data-csadd]').forEach(b=>b.onclick=()=>{
    const [emoji,title]=b.dataset.csadd.split('|');
    state.custom.push({id:'cs_'+Date.now(),emoji,title,items:[{title:'',sub:'',period:'',desc:''}]});
    activeCustom=state.custom.length-1;
    renderStep(); liveUpdate(); scrollOpenToTop();
  });
  if(activeCustom<0) bindOpenBody();
  else bindOpenBody(); // 표준 스텝 입력도 유지
  renderNav();
  scrollOpenToTop();
}

/* 기간 문자열 ↔ 월 선택 변환 */
function parsePeriod(str){
  str=String(str||'').trim();
  const present=/현재|present|now|재직|진행/i.test(str);
  const parts=str.split(/[–~]|(?<=\d)\s*-\s*(?=\d)/).map(s=>s.trim());
  const norm=(s)=>{ const m=String(s).match(/(\d{4})[.\-\/년 ]*(\d{1,2})?/); if(!m) return ''; return `${m[1]}-${m[2]?String(m[2]).padStart(2,'0'):'01'}`; };
  const start=parts[0]?norm(parts[0]):'';
  const end=(!present&&parts[1])?norm(parts[1]):'';
  return {start,end,present};
}
function composePeriod(start,end,present){
  const fmt=(v)=>{ if(!v) return ''; const a=v.split('-'); return a[1]?`${a[0]}.${a[1]}`:a[0]; };
  const s=fmt(start), e=present?'현재':fmt(end);
  if(!s&&!e) return '';
  return (s&&e)?`${s} – ${e}`:(s||e);
}

function renderRepeater(key,host,schema,label){
  if(!host)return;
  const list=getRepList(key);
  let html='';
  if(!list.length) html+=`<div class="rep-empty">아직 추가된 ${label}이(가) 없어요.</div>`;
  list.forEach((item,idx)=>{
    const rows=[];
    let buffer=[];
    schema.forEach(f=>{
      if(f.type==='period'){
        if(buffer.length){rows.push(buffer);buffer=[];}
        const pv=parsePeriod(item[f.k]||'');
        rows.push([`<div class="field period-field" style="margin-bottom:12px">
          <span class="rep-flabel">${esc(f.label||'기간')}</span>
          <div class="period-pick" data-pkey="${key}" data-pidx="${idx}" data-pk="${f.k}">
            <input type="month" class="inp period-inp" data-pstart value="${pv.start}" aria-label="시작">
            <span class="period-sep">–</span>
            <input type="month" class="inp period-inp" data-pend value="${pv.end}" ${pv.present?'disabled':''} aria-label="종료">
            <label class="period-now"><input type="checkbox" data-ppresent ${pv.present?'checked':''}> 현재</label>
          </div>
        </div>`]);
        return;
      }
      const listAttr=f.list?`list="dl-${key}-${f.k}"`:'';
      const ctrl = f.area
        ? `<textarea class="inp" data-rep="${key}" data-idx="${idx}" data-k="${f.k}" placeholder="${esc(f.ph)}">${esc(item[f.k]||'')}</textarea>`
        : `<input class="inp" ${listAttr} data-rep="${key}" data-idx="${idx}" data-k="${f.k}" placeholder="${esc(f.ph)}" value="${esc(item[f.k]||'')}">`;
      const fieldHtml=`<div class="field" style="margin-bottom:12px">${ctrl}</div>`;
      if(f.full){ if(buffer.length){rows.push(buffer);buffer=[];} rows.push([fieldHtml]); }
      else { buffer.push(fieldHtml); if(buffer.length===2){rows.push(buffer);buffer=[];} }
    });
    if(buffer.length)rows.push(buffer);
    const fields=rows.map(r=> r.length>1 ? `<div class="inp-row">${r.join('')}</div>` : r[0]).join('');
    html+=`<div class="rep-card">
      <div class="rep-head">
        <span class="rep-badge">${label} ${idx+1}</span>
        <button class="rep-mv" data-mvkey="${key}" data-idx="${idx}" data-dir="-1" ${idx===0?'disabled':''} title="위로" aria-label="위로 이동"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 15l-6-6-6 6"/></svg></button>
        <button class="rep-mv" data-mvkey="${key}" data-idx="${idx}" data-dir="1" ${idx===list.length-1?'disabled':''} title="아래로" aria-label="아래로 이동"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M6 9l6 6 6-6"/></svg></button>
        <button class="rep-del" data-del="${key}" data-idx="${idx}" title="삭제" aria-label="${label} 삭제"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"/></svg></button>
      </div>
      ${fields}</div>`;
  });
  html+=`<button class="rep-add" data-add="${key}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg> ${label} 추가</button>`;
  // 자동완성 데이터리스트 (한 번만)
  schema.forEach(f=>{ if(f.list) html+=`<datalist id="dl-${key}-${f.k}">${f.list.map(o=>`<option value="${esc(o)}">`).join('')}</datalist>`; });
  host.innerHTML=html;

  // 기간 선택 위젯
  host.querySelectorAll('.period-pick').forEach(pp=>{
    const k2=pp.dataset.pk, idx2=+pp.dataset.pidx, key2=pp.dataset.pkey;
    const s=pp.querySelector('[data-pstart]'), e=pp.querySelector('[data-pend]'), c=pp.querySelector('[data-ppresent]');
    const upd=()=>{ e.disabled=c.checked; getRepList(key2)[idx2][k2]=composePeriod(s.value,e.value,c.checked); liveUpdate(); };
    [s,e,c].forEach(el=>el.addEventListener('change',upd));
  });

  host.querySelectorAll('[data-rep]').forEach(n=>{
    if(n.tagName==='TEXTAREA') autoResize(n);
    n.addEventListener('input',()=>{ getRepList(n.dataset.rep)[+n.dataset.idx][n.dataset.k]=n.value; if(n.tagName==='TEXTAREA') autoResize(n); liveUpdate(); });
  });
  host.querySelectorAll('[data-mv],.rep-mv[data-mvkey]').forEach(b=>b.addEventListener('click',()=>{
    if(b.disabled||b.getAttribute('disabled')!=null) return;
    const list2=getRepList(b.dataset.mvkey), i=+b.dataset.idx, d=+b.dataset.dir;
    [list2[i],list2[i+d]]=[list2[i+d],list2[i]];
    renderRepeater(key,host,schema,label); liveUpdate();
  }));
  host.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{ getRepList(b.dataset.del).splice(+b.dataset.idx,1); renderRepeater(key,host,schema,label); liveUpdate(); });
  host.querySelector('[data-add]').onclick=()=>{ const blank={}; schema.forEach(f=>blank[f.k]=''); getRepList(key).push(blank); renderRepeater(key,host,schema,label); liveUpdate();
    setTimeout(()=>{const cards=host.querySelectorAll('.rep-card');const last=cards[cards.length-1];if(last){last.querySelector('.inp').focus();}},30); };
}

function sectionKeys(st){ const base=['skills','tools','experience','projects']; if(st.github&&st.github.repos&&st.github.repos.length) base.push('github'); base.push('education'); return [...base,...(st.custom||[]).map(c=>'cs:'+c.id)]; }
function orderedSections(st){
  const all=sectionKeys(st), ord=st.sectionOrder||[];
  return all.slice().sort((a,b)=>{
    let ia=ord.indexOf(a), ib=ord.indexOf(b);
    if(ia<0) ia=1000+all.indexOf(a);
    if(ib<0) ib=1000+all.indexOf(b);
    return ia-ib;
  });
}

    : `<div class="np-empty-ph">경력을 추가해보세요</div>`;

  // education
  let eduInner = st.education.length

  // 아이콘 없음 → 미리보기에서 완전히 제거 (자리표시 없음)

    : `<h1 class="${titleCls}">${esc(titleTxt)}</h1>`;
  const tagEl = edit
    ? `<div class="np-tagline pv-edit" data-goto="0" data-edit="profile.tagline" data-ph="한 줄 태그라인">${esc(p.tagline||'')}</div>`
    : (p.tagline?`<div class="np-tagline">${esc(p.tagline)}</div>`:'');

  // custom sections — id별 맵
  const customMap={};
  (st.custom||[]).forEach((cs,ci)=>{
    if(!cs.title&&!edit) return;
    const rows=(cs.items||[]).map((it,ii)=>({it,ii})).filter(r=>r.it.title||edit);
    let inner=rows.length?rows.map(({it,ii})=>`<div class="np-item"><div class="np-item-top"><div><span class="np-item-title"${ed('custom.'+ci+'.items.'+ii+'.title','항목 제목')}>${esc(it.title||'')}</span>${(it.sub||edit)?` <span class="np-item-sub">· <span${ed('custom.'+ci+'.items.'+ii+'.sub','부제목')}>${esc(it.sub||'')}</span></span>`:''}</div>${(it.period||edit)?`<span class="np-item-period"${ed('custom.'+ci+'.items.'+ii+'.period','기간')}>${esc(it.period||'')}</span>`:''}</div>${(it.desc||edit)?`<div class="np-item-desc"${ed('custom.'+ci+'.items.'+ii+'.desc','설명')}>${esc(it.desc||'')}</div>`:''}</div>`).join(''):(edit?`<div class="np-empty-ph">항목을 추가해보세요</div>`:'');
    if(!inner&&!edit) return;
    customMap['cs:'+cs.id]=`<div class="np-section"><div class="np-h"><span class="he">${esc(cs.emoji||'📌')}</span><span${ed('custom.'+ci+'.title','섹션 이름')}>${esc(cs.title||'커스텀 섹션')}</span></div>${inner}</div>`;

  // 섹션 순서대로 조립 (skipSkills: 사이드바는 skills를 aside에 별도 배치)
  const secMap={skills:skillsSec,tools:toolsSec,experience:expSec,projects:projSec,github:githubSec,education:eduSec,...customMap};
  const bodySections=(skipKeys)=>orderedSections(st).filter(k=>!(skipKeys&&skipKeys.includes(k))).map(k=>secMap[k]||'').join('');

  const layout=(st.theme&&st.theme.layout)||'notion';
  const wideCls=(st.theme&&st.theme.wide)?' wide':'';
  const styCls=` sty-${(st.theme&&st.theme.style)||'classic'}`;
  const accVar=`--accent:${accentHex(st)}`;
  const noCover=!!(st.theme&&st.theme.noCover);
  const noCoverCls=noCover?' no-cover':'';
  const coverEl=noCover?'':`<div class="np-cover" style="background:${coverBg(st)}"></div>`;
  const accentEl=noCover?'':`<div class="np-min-accent" style="background:${coverBg(st)}"></div>`;

  if(layout==='sidebar'){
    return `<div class="notion-page lay-sidebar${wideCls}${styCls}${noIconCls}${noCoverCls}" style="${accVar}">
      ${coverEl}
      <div class="np-body np-sb-grid">
        <aside class="np-aside">${iconEl}${titleEl}${tagEl}${propsBlock}${skillsSec}</aside>
        <main class="np-sb-main">${callout}${bodySections(['skills'])}</main>
      </div>

  }
  if(layout==='minimal'){
    return `<div class="notion-page lay-minimal${wideCls}${styCls}${noIconCls}${noCoverCls}" style="${accVar}">
      ${accentEl}
      <div class="np-body">
        <div class="np-min-head">${iconEl}${titleEl}${tagEl}${propsBlock}</div>
        ${callout}
        ${bodySections()}
      </div>
    </div>`;
  }
  return `<div class="notion-page lay-notion${wideCls}${styCls}${noIconCls}${noCoverCls}" style="${accVar}">
    ${coverEl}
    <div class="np-body">
      ${iconEl}
      ${titleEl}
      ${tagEl}
      ${propsBlock}
      ${callout}
      ${bodySections()}
    </div>
  </div>`;
}
