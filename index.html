/* =========================================================
   LIVE UPDATE
   ========================================================= */
function liveUpdate(){
  if(!isUndoing){
    const cur=snapshot();
    if(prevSnap&&prevSnap!==cur){ undoStack.push(prevSnap); if(undoStack.length>MAX_UNDO) undoStack.shift(); }
    prevSnap=cur;
  }
  const root=document.getElementById('preview-root');
  root.innerHTML=renderPageHTML(state,{edit:true});
  root.querySelectorAll('.pv-edit').forEach(n=>n.onclick=(e)=>{e.stopPropagation();goStep(+n.dataset.goto);});
  renderNav();
  if(STEPS[currentStep]?.id==='skills'){ renderSkillsPreview(); renderSkillSuggestions(); }
  if(STEPS[currentStep]?.id==='tools') renderToolsPicker();
  save();
}

function goStep(i){ infoCollapsed=false; currentStep=Math.max(0,Math.min(STEPS.length-1,i)); visited.add(currentStep); renderStep(); renderNav(); save(); document.getElementById('preview-pane'); }
function next(){ if(currentStep<STEPS.length-1) goStep(currentStep+1); }
function prev(){ if(currentStep>0) goStep(currentStep-1); }

let slideIdx=0, slideKeyHandler=null, slideResize=null;
function buildSlidesHTML(st){
  const dark=st.theme.mode==='dark'; const p=st.profile;
  const cover=coverBg(st);
  const slEmoji = p.iconImg?`<img class="sl-emoji-img" src="${p.iconImg}" alt="">`:p.emoji;
  const tags=st.skills.split(',').map(t=>t.trim()).filter(Boolean);
  const chip=(t,big)=>{const c=tagColor(t,dark);return `<span class="${big?'sl-tag-chip':'np-tag'}" style="background:${c.bg};color:${c.fg}">${esc(t)}</span>`;};

  // Slide 1: title
  const s1=`<div class="slide" data-i="0">
    <div class="slide-cover band" style="background:${cover}"></div>
    <div style="position:relative;display:flex;flex-direction:column;height:100%">
      <div class="sl-emoji">${slEmoji}</div>
      <div class="sl-name">${esc(p.name||'Your Name')}</div>
      <div class="sl-role">${esc(p.role||'Your Role')}</div>

    </div>
    <div class="sl-pageno">01 / 05</div></div>`;

  // Slide 2: about + skills
  const s2=`<div class="slide" data-i="1">
    <div class="slide-cover band" style="background:${cover}"></div>
    <div class="sl-kicker">소개</div>
    ${st.about?`<div class="sl-callout"><span class="e">💡</span><span>${esc(st.about)}</span></div>`:''}
    <div class="sl-h"><span>🛠️</span>기술 스택</div>
    <div class="sl-tags">${tags.length?tags.map(t=>chip(t,true)).join(''):'<span style="color:var(--text-faint)">—</span>'}</div>
    <div class="sl-pageno">02 / 05</div></div>`;

  const listSlide=(i,emoji,title,items)=>`<div class="slide" data-i="${i}">
    <div class="slide-cover band" style="background:${cover}"></div>
    <div class="sl-kicker">${title}</div>
    <div class="sl-h"><span>${emoji}</span>${title}</div>
    <div class="sl-list">${items}</div>
    <div class="sl-pageno">0${i+1} / 05</div></div>`;

  const exItems = st.experience.length? st.experience.slice(0,4).map(x=>`<div><div class="sl-li-top"><div><span class="sl-li-title">${esc(x.role||'')}</span> <span class="sl-li-sub">· ${esc(x.company||'')}${x.level?` · ${esc(x.level)}`:''}</span></div><span class="sl-li-period">${esc(x.period||'')}</span></div>${x.desc?`<div class="sl-li-desc">${esc(x.desc)}</div>`:''}</div>`).join('') : '<div style="color:var(--text-faint)">경력 정보 없음</div>';
  const s3=listSlide(2,'💼','경력',exItems);

  const prItems = st.projects.length? st.projects.slice(0,4).map(x=>{const t=(x.tech||'').split(',').map(s=>s.trim()).filter(Boolean);const sub=x.role?` <span class="sl-li-sub">· ${esc(x.role)}</span>`:'';return `<div><div class="sl-li-top"><div><span class="sl-li-title">${esc(x.name||'')}</span>${sub}</div></div>${x.desc?`<div class="sl-li-desc">${esc(x.desc)}</div>`:''}${x.result?`<div class="sl-li-desc">🏆 ${esc(x.result)}</div>`:''}${t.length?`<div class="sl-tags" style="margin-top:8px">${t.map(s=>chip(s,false)).join('')}</div>`:''}</div>`;}).join('') : '<div style="color:var(--text-faint)">프로젝트 정보 없음</div>';
  const s4=listSlide(3,'🚀','프로젝트',prItems);

  const eduItems = st.education.length? st.education.map(x=>`<div><div class="sl-li-top"><div><span class="sl-li-title">${esc(x.school||'')}</span> <span class="sl-li-sub">· ${esc(x.degree||'')}</span></div><span class="sl-li-period">${esc(x.period||'')}</span></div></div>`).join('') : '<div style="color:var(--text-faint)">학력 정보 없음</div>';

  if(p.github)contacts.push(`<div>🐙 ${esc(p.github)}</div>`);

  if(p.location)contacts.push(`<div>📍 ${esc(p.location)}</div>`);
  const s5=`<div class="slide" data-i="4">

function openSlides(){
  closeMenus();
  const ov=document.getElementById('slides-overlay');
  ov.classList.remove('hidden');
  ov.innerHTML=`
    <div class="slide-stage"><div class="slide-canvas" id="slide-canvas" style="--accent:${accentHex(state)}">${buildSlidesHTML(state)}</div></div>
    <button class="slide-exit" id="sl-exit"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    <button class="slide-arrow prev" id="sl-prev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 18l-6-6 6-6"/></svg></button>
    <button class="slide-arrow next" id="sl-next"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M9 18l6-6-6-6"/></svg></button>
    <div class="slide-dots" id="sl-dots">${[0,1,2,3,4].map(i=>`<div class="slide-dot" data-i="${i}"></div>`).join('')}</div>`;
  slideIdx=0; showSlide(0); scaleSlides();
  document.getElementById('sl-exit').onclick=closeSlides;
  document.getElementById('sl-prev').onclick=()=>showSlide(slideIdx-1);
  document.getElementById('sl-next').onclick=()=>showSlide(slideIdx+1);
  ov.querySelectorAll('.slide-dot').forEach(d=>d.onclick=()=>showSlide(+d.dataset.i));
  slideKeyHandler=(e)=>{ if(e.key==='ArrowRight'||e.key==='PageDown'||e.key===' ')showSlide(slideIdx+1); else if(e.key==='ArrowLeft'||e.key==='PageUp')showSlide(slideIdx-1); else if(e.key==='Escape')closeSlides(); };
  window.addEventListener('keydown',slideKeyHandler);
  slideResize=scaleSlides; window.addEventListener('resize',slideResize);
}
function scaleSlides(){
  const c=document.getElementById('slide-canvas'); if(!c)return;
  const s=Math.min(window.innerWidth/1280,window.innerHeight/720)*0.92;
  c.style.transform=`scale(${s})`;
}
function showSlide(i){
  const ov=document.getElementById('slides-overlay');
  const slides=ov.querySelectorAll('.slide'); if(!slides.length)return;
  slideIdx=(i+slides.length)%slides.length;
  slides.forEach((s,n)=>s.classList.toggle('on',n===slideIdx));
  ov.querySelectorAll('.slide-dot').forEach((d,n)=>d.classList.toggle('on',n===slideIdx));
}
function closeSlides(){
  document.getElementById('slides-overlay').classList.add('hidden');
  document.getElementById('slides-overlay').innerHTML='';
  if(slideKeyHandler)window.removeEventListener('keydown',slideKeyHandler);
  if(slideResize)window.removeEventListener('resize',slideResize);
}

let gIndex=0, guideKey=null;

function openGuide(){
  closeMenus();
  if(guideKey){ window.removeEventListener('keydown',guideKey); guideKey=null; } // avoid stacking listeners
  gIndex=0;
  document.getElementById('guide-overlay').classList.remove('hidden');
  guideKey=(e)=>{
    if(e.key==='Escape'){ closeGuide(); return; }
    if(e.key!=='Enter'||e.shiftKey) return;          // Shift+Enter → 줄바꿈(기본 동작)
    const el=document.activeElement, tag=el.tagName;
    if(tag==='TEXTAREA' && el.id!=='g-input') return; // 반복 폼(경력/프로젝트)의 설명칸은 줄바꿈 유지
    e.preventDefault(); guideNext();                  // 입력칸·자기소개 → 다음 단계
  };
  window.addEventListener('keydown',guideKey);
  renderGuide();
}
function closeGuide(){
  const ov=document.getElementById('guide-overlay');
  ov.classList.add('hidden'); ov.innerHTML='';
  if(guideKey){ window.removeEventListener('keydown',guideKey); guideKey=null; }
  renderStep(); liveUpdate(); save();
}
function guideNext(){ if(gIndex<GUIDE.length-1){ gIndex++; renderGuide(); } else { closeGuide(); } }
function guidePrev(){ if(gIndex>0){ gIndex--; renderGuide(); } }

function renderGuide(){
  const ov=document.getElementById('guide-overlay');
  const card=GUIDE[gIndex];
  const pct=Math.round(gIndex/(GUIDE.length-1)*100);
  let body='', footer='';

  if(card.type==='intro'){
    body=`<div class="guide-card" style="text-align:center">
      <div class="guide-intro-emoji">✨</div>
      <div class="guide-q">몇 가지 질문에 답하면<br>포트폴리오가 완성돼요</div>
      <div class="guide-hint">한 항목씩 차근차근 안내해 드릴게요. 언제든 건너뛰거나 나갈 수 있어요.</div>
      <ul class="guide-intro-list" style="max-width:300px;margin-left:auto;margin-right:auto;text-align:left">
        <li><span class="n">1</span> 기본 정보 · 연락처</li>
        <li><span class="n">2</span> 소개 · 기술 스택</li>
        <li><span class="n">3</span> 경력 · 프로젝트 · 학력</li>
      </ul></div>`;
    footer=`<div class="guide-nav-inner"><button class="gbtn ghost" data-gskip>나중에 직접 입력</button><div class="sp"></div><button class="gbtn solid" data-gnext>시작하기 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></button></div>`;
  }
  else if(card.type==='done'){
    const pc=completion();
    body=`<div class="guide-card" style="text-align:center">
      <div class="guide-done-emoji">🎉</div>
      <div class="guide-q">입력을 마쳤어요!</div>
      <div class="guide-hint">현재 ${pc}% 완성됐어요. 미리보기에서 다듬거나 바로 내보낼 수 있어요.</div></div>`;
    footer=`<div class="guide-nav-inner"><button class="gbtn ghost" data-gprev><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg> 이전</button><div class="sp"></div><button class="gbtn solid" data-gdone>미리보기로 이동 <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg></button></div>`;
  }
  else {
    const kick=`<div class="guide-kicker"><span class="gk-num">${gIndex}/${GUIDE.length-2}</span> ${card.kicker}</div>`;
    let inner='';
    if(card.type==='text'){
      inner=`<input class="guide-input" id="g-input" placeholder="${esc(card.ph||'')}" value="${esc(getPath(card.path))}">
        <div class="guide-enter-hint"><kbd>Enter ↵</kbd> 로 다음으로</div>`;
    } else if(card.type==='textarea'){
      inner=`<textarea class="guide-input" id="g-input" placeholder="${esc(card.ph||'')}">${esc(getPath(card.path))}</textarea>
        <div class="guide-enter-hint"><kbd>Enter ↵</kbd> 다음 · <kbd>Shift + Enter</kbd> 줄바꿈</div>`;
    } else if(card.type==='skills'){
      inner=`<input class="guide-input" id="g-input" placeholder="${esc(card.ph||'')}" value="${esc(getPath(card.path))}">
        <div class="guide-tags" id="g-tags"></div>`;
    } else if(card.type==='icon'){
      inner=`<div id="g-icon"></div>`;
    } else if(card.type==='section'){
      inner=`<div class="guide-rep-host" id="g-rep"></div>`;
    }
    body=`<div class="guide-card">${kick}<div class="guide-q">${card.q}</div>${card.hint?`<div class="guide-hint">${card.hint}</div>`:''}${inner}</div>`;
    const nextLabel = gIndex===GUIDE.length-2 ? '완료' : '다음';
    footer=`<div class="guide-nav-inner">
      <button class="gbtn ghost" data-gprev><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg> 이전</button>
      <div class="sp"></div>
      <button class="gbtn ghost" data-gskip>건너뛰기</button>
      <button class="gbtn solid" data-gnext>${nextLabel} <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg></button>
    </div>`;
  }

  ov.innerHTML=`
    <div class="guide-top">
      <div class="guide-brand"><span class="logo">${state.profile.iconImg?`<img src="${state.profile.iconImg}" style="width:100%;height:100%;object-fit:cover;border-radius:6px">`:(state.profile.emoji||'📓')}</span> 입력 도우미</div>
      <div class="gbar"><div class="gfill" style="width:${pct}%"></div></div>
      <span class="guide-count">${Math.min(gIndex+1,GUIDE.length)} / ${GUIDE.length}</span>
      <button class="guide-close" data-gclose title="나가기 (Esc)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 6l12 12M18 6L6 18"/></svg></button>
    </div>
    <div class="guide-body scroll">${body}</div>
    <div class="guide-nav">${footer}</div>`;

  // wire nav
  ov.querySelector('[data-gclose]').onclick=closeGuide;
  const bN=ov.querySelector('[data-gnext]'); if(bN) bN.onclick=guideNext;
  const bP=ov.querySelector('[data-gprev]'); if(bP) bP.onclick=guidePrev;
  const bS=ov.querySelector('[data-gskip]'); if(bS) bS.onclick=()=>{ if(card.type==='intro') closeGuide(); else guideNext(); };
  const bD=ov.querySelector('[data-gdone]'); if(bD) bD.onclick=closeGuide;

  // wire inputs
  const gi=ov.querySelector('#g-input');
  if(gi){
    gi.addEventListener('input',()=>{ setPath(card.path,gi.value); if(card.type==='skills') renderGuideTags(); liveUpdate(); });
    setTimeout(()=>gi.focus(),60);
  }
  if(card.type==='skills') renderGuideTags();
  if(card.type==='icon') renderIconControl('g-icon');
  if(card.type==='section') renderRepeater(card.key,document.getElementById('g-rep'),card.fields,card.label);
}
function renderGuideTags(){
  const wrap=document.getElementById('g-tags'); if(!wrap)return;
  const dark=state.theme.mode==='dark';
  const tags=String(getPath('skills')||'').split(',').map(t=>t.trim()).filter(Boolean);
  wrap.innerHTML=tags.map(t=>{const c=tagColor(t,dark);return `<span class="np-tag" style="background:${c.bg};color:${c.fg}">${esc(t)}</span>`;}).join('');
}
function getPath(path){ const parts=String(path).split('.'); let o=state; for(const k of parts){ if(o==null)return ''; o=o[k]; } return o==null?'':o; }

/* =========================================================
   EXPORT: Markdown / JSON / standalone HTML
   ========================================================= */
/* 노션에서 바로 채워 쓸 수 있도록 빈 항목도 양식(스켈레톤)으로 출력.
   빈 값은 _기울임_ 자리표시로 표기 → 노션에서 지우고 입력하면 됨. */
function toMarkdown(st){
  const p=st.profile; let m='';
  const PH=(v,hint)=> v && String(v).trim() ? String(v).trim() : `_${hint}_`;
  const cell=v=> v && String(v).trim() ? String(v).trim() : ' ';

  m+=`# ${p.emoji||'👋'} ${p.name||'이름'}\n\n`;
  m+=`**${PH(p.role,'직무 / 타이틀')}** — ${PH(p.tagline,'한 줄 태그라인')}\n\n`;

  // 연락처·링크 표 — 항상 전체 행(빈 칸은 비워둠) → 노션에서 채우기
  m+=`| | |\n| --- | --- |\n`;
  m+=`| 💼 직무 | ${cell(p.role)} |\n`;
  m+=`| 📍 위치 | ${cell(p.location)} |\n`;
  m+=`| ✉️ 이메일 | ${cell(p.email)} |\n`;
  m+=`| 🐙 GitHub | ${cell(p.github)} |\n`;
  m+=`| 🌐 웹사이트 | ${cell(p.website)} |\n`;
  (p.links||[]).forEach(l=>{ if(l.label||l.url) m+=`| 🔗 ${l.label||'링크'} | ${cell(l.url)} |\n`; });
  m+='\n';

  m+=`## 💡 소개\n\n${st.about&&st.about.trim()?st.about:'_여기에 자기소개를 작성하세요._'}\n\n`;

  // 섹션별 마크다운을 만들고 sectionOrder대로 출력
  const secMd={};
  const tags=st.skills.split(',').map(t=>t.trim()).filter(Boolean);
  secMd.skills=`## 🛠️ 기술 스택\n\n${tags.length?tags.join(', '):'_기술 스택을 입력하세요 (쉼표로 구분)_'}\n\n`;
  const selT=st.tools||[];
  secMd.tools=`## 🧰 서비스 · 도구\n\n${selT.length?selT.join(', '):'_사용하는 도구·서비스를 입력하세요_'}\n\n`;
  { let s=`## 💼 경력\n\n`;
    (st.experience.length?st.experience:[{}]).forEach(x=>{
      s+=`### ${PH(x.role,'직무')} · ${PH(x.company,'회사')}${x.level?` · ${x.level}`:''}\n`;
      const meta2=[]; if(x.type)meta2.push(x.type); if(x.period)meta2.push(x.period);
      s+=`_${meta2.length?meta2.join(' · '):'고용형태 · 기간'}_\n\n`;
      s+=`${x.desc&&x.desc.trim()?x.desc:'_주요 성과·담당 업무를 작성하세요._'}\n\n`;
    }); secMd.experience=s; }
  { let s=`## 🚀 프로젝트\n\n`;
    (st.projects.length?st.projects:[{}]).forEach(x=>{
      s+=`### ${PH(x.name,'프로젝트명')}${x.period?` (${x.period})`:''}\n`;
      if(x.role&&x.role.trim()) s+=`**담당 역할:** ${x.role}\n\n`;
      s+=`${x.desc&&x.desc.trim()?x.desc:'_프로젝트 설명 / 담당 업무를 작성하세요._'}\n\n`;
      if(x.result&&x.result.trim()) s+=`**성과:** ${x.result.replace(/\n/g,'\n> ')}\n\n`;
      const t=(x.tech||'').split(',').map(z=>z.trim()).filter(Boolean);
      if(t.length) s+=t.join(', ')+'\n\n';
      const lk=[]; if(x.repo)lk.push(`[GitHub](${normUrl(x.repo)})`); const demo=x.demo||x.link; if(demo)lk.push(`[데모](${normUrl(demo)})`);
      if(lk.length) s+=lk.join(' · ')+'\n\n';
    }); secMd.projects=s; }
  { let s=`## 🎓 교육\n\n`;
    (st.education.length?st.education:[{}]).forEach(x=>{
      s+=`- **${PH(x.school,'학교명')}** · ${PH(x.degree,'전공 / 학위')}${x.period?` _(${x.period})_`:''}\n`;
    }); s+='\n'; secMd.education=s; }
  { const gr=(st.github&&st.github.repos)||[];
    if(gr.length){ let s=`## 🐙 GitHub\n\n`;
      gr.forEach(r=>{ s+=`- **[${r.name}](${r.url})**${r.stars?` · ⭐ ${r.stars}`:''}${r.lang?` · ${r.lang}`:''}${r.desc?` — ${r.desc}`:''}\n`; });
      s+='\n'; secMd.github=s; } }
  (st.custom||[]).forEach(cs=>{
    if(!cs.title) return;
    let s=`## ${cs.emoji||'📌'} ${cs.title}\n\n`;
    const items=(cs.items||[]).filter(it=>it.title);
    (items.length?items:[{}]).forEach(it=>{
      s+=`### ${PH(it.title,'제목')}${it.sub?' · '+it.sub:''}\n`;
      if(it.period)s+=`_${it.period}_\n\n`; else s+='\n';
      if(it.desc&&it.desc.trim())s+=it.desc+'\n\n';
    });
    secMd['cs:'+cs.id]=s;
  });
  orderedSections(st).forEach(k=>{ if(secMd[k]) m+=secMd[k]; });
  return m.trim()+'\n';
}

   '<div class="slide-dots">'+[0,1,2,3,4].map(function(i){return '<div class="slide-dot" data-i="'+i+'"></div>';}).join('')+'</div>';
  slideIdx=0;show(0);scale();
  gid('s-exit').onclick=close;gid('s-prev').onclick=function(){show(slideIdx-1);};gid('s-next').onclick=function(){show(slideIdx+1);};
  ov.querySelectorAll('.slide-dot').forEach(function(d){d.onclick=function(){show(+d.dataset.i);};});
  kh=function(e){if(e.key==='ArrowRight'||e.key===' ')show(slideIdx+1);else if(e.key==='ArrowLeft')show(slideIdx-1);else if(e.key==='Escape')close();};
  addEventListener('keydown',kh);rs=scale;addEventListener('resize',rs);
}
function close(){var ov=gid('slides-overlay');ov.classList.add('hidden');ov.innerHTML='';if(kh)removeEventListener('keydown',kh);if(rs)removeEventListener('resize',rs);}
gid('v-present').onclick=present;
<\/script>
</body>
</html>`;
  return html;
}

function download(filename,text,mime){
  const blob=new Blob([text],{type:mime||'text/plain;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;
  document.body.appendChild(a);a.click();setTimeout(()=>{URL.revokeObjectURL(a.href);a.remove();},100);
}

/* ---------- PowerPoint (.pptx) ---------- */
const PPTX_CDN='https://cdn.jsdelivr.net/npm/pptxgenjs@3.12.0/dist/pptxgen.bundle.js';
function ensureScript(src){
  return new Promise((res,rej)=>{
    if(window.PptxGenJS) return res();
    if([...document.scripts].some(s=>s.src===src)){ const t=setInterval(()=>{ if(window.PptxGenJS){clearInterval(t);res();} },80); return; }
    const s=document.createElement('script'); s.src=src; s.onload=()=>res(); s.onerror=()=>rej(new Error('load failed')); document.head.appendChild(s);
  });
}
function firstHex(css){ const m=String(css).match(/#([0-9a-f]{6})/i); return m?m[1].toUpperCase():'2383E2'; }
function coverPrimary(st){ return st.theme.coverImg?'2A2A2A':firstHex(gradientCss(st.theme.cover)); }
function stripHash(h){ return String(h||'').replace('#',''); }

async function exportPPTX(){
  closeMenus();
  if(completion()===0){ toast('먼저 내용을 입력해주세요'); return; }
  toast('📽️ PowerPoint 파일을 만드는 중…');
  try{ await ensureScript(PPTX_CDN); }
  catch(e){ toast('라이브러리를 불러오지 못했어요. 인터넷 연결을 확인하세요'); return; }
  const p=state.profile, st=state, accent=coverPrimary(st);
  const TX='37352F', FAINT='9B9690', WHITE='FFFFFF';
  const pptx=new PptxGenJS();
  pptx.defineLayout({name:'W',width:13.333,height:7.5}); pptx.layout='W';
  pptx.author='pofo'; pptx.title=(p.name||'Portfolio')+' Portfolio';
  const MX=0.9;
  const skills=st.skills.split(',').map(t=>t.trim()).filter(Boolean);

  // wrapped tag chips ------------------------------------------------
  function addChips(slide,items,x0,y0,maxW,opt){
    opt=opt||{}; const fs=opt.fs||13, h=opt.h||0.42, gap=0.12, padX=0.16, lh=h+0.12;
    let x=x0,y=y0;
    items.forEach(t=>{
      const w=Math.min(maxW, Math.max(0.6, t.length*fs*0.013+padX*2));
      if(x+w>x0+maxW){ x=x0; y+=lh; }
      const c=tagColor(t,false);
      slide.addShape('roundRect',{x,y,w,h,rectRadius:0.06,fill:{color:stripHash(c.bg)},line:{type:'none'}});
      slide.addText(t,{x,y,w,h,fontSize:fs,color:stripHash(c.fg),align:'center',valign:'middle',fontFace:'Arial'});
      x+=w+gap;
    });
    return y+lh;
  }
  function bandTop(slide){
    if(st.theme.coverImg) slide.addImage({data:st.theme.coverImg,x:0,y:0,w:13.333,h:0.28});
    else slide.addShape('rect',{x:0,y:0,w:13.333,h:0.28,fill:{color:accent},line:{type:'none'}});
  }
  function kicker(slide,txt){ slide.addText(txt.toUpperCase(),{x:MX,y:0.62,w:11,h:0.4,fontSize:12,bold:true,color:FAINT,charSpacing:2,fontFace:'Arial'}); }
  function heading(slide,emoji,txt){ slide.addText(`${emoji}  ${txt}`,{x:MX,y:1.0,w:11.5,h:0.7,fontSize:30,bold:true,color:TX,fontFace:'Arial'}); }
  function pageno(slide,n){ slide.addText(n+' / 05',{x:11.4,y:6.85,w:1.4,h:0.35,fontSize:12,color:FAINT,align:'right',fontFace:'Arial'}); }

  // Slide 1 — title --------------------------------------------------
  const s1=pptx.addSlide(); s1.background={color:WHITE};
  if(st.theme.coverImg) s1.addImage({data:st.theme.coverImg,x:0,y:0,w:13.333,h:2.3,sizing:{type:'cover',w:13.333,h:2.3}});
  else s1.addShape('rect',{x:0,y:0,w:13.333,h:2.3,fill:{color:accent},line:{type:'none'}});
  if(p.iconImg) s1.addImage({data:p.iconImg,x:MX,y:1.5,w:1.5,h:1.5,rounding:true});
  else s1.addText(p.emoji||'👋',{x:MX,y:1.4,w:2,h:1.5,fontSize:70,fontFace:'Arial'});
  s1.addText(p.name||'Your Name',{x:MX,y:3.2,w:11.5,h:1.1,fontSize:54,bold:true,color:TX,fontFace:'Arial'});
  s1.addText(p.role||'',{x:MX,y:4.35,w:11.5,h:0.7,fontSize:26,color:FAINT,fontFace:'Arial'});
  if(p.tagline) s1.addText('“'+p.tagline+'”',{x:MX,y:6.0,w:11.5,h:0.8,fontSize:18,italic:true,color:FAINT,fontFace:'Arial'});
  pageno(s1,'01');

  // Slide 2 — about + skills ----------------------------------------
  const s2=pptx.addSlide(); s2.background={color:WHITE}; bandTop(s2); kicker(s2,'소개');
  let yy=1.0;
  if(st.about){ s2.addShape('roundRect',{x:MX,y:yy,w:11.5,h:1.4,rectRadius:0.08,fill:{color:'F5F4F2'},line:{type:'none'}});
    s2.addText([{text:'💡  ',options:{fontSize:18}},{text:st.about,options:{fontSize:16,color:TX}}],{x:MX+0.3,y:yy,w:11,h:1.4,valign:'middle',fontFace:'Arial'}); yy+=1.8; }
  s2.addText('🛠️  기술 스택',{x:MX,y:yy,w:11,h:0.6,fontSize:26,bold:true,color:TX,fontFace:'Arial'}); yy+=0.8;
  if(skills.length) addChips(s2,skills,MX,yy,11.5,{fs:14,h:0.46});
  pageno(s2,'02');

  // list slides — 동적 슬라이드 번호 계산 ---------------------------
  let slideNum=2;
  const totalSlides=3+[st.experience.length,st.projects.length].filter(Boolean).length; // 1(title)+1(about)+N+1(edu)
  function listSlide(emoji,title,rows){
    slideNum++;
    const s=pptx.addSlide(); s.background={color:WHITE}; bandTop(s); kicker(s,title); heading(s,emoji,title);
    let y=2.0;
    const shown=rows.slice(0,4); const extra=rows.length-shown.length;
    shown.forEach(r=>{
      s.addText([{text:r.title,options:{bold:true,fontSize:18,color:TX}},r.sub?{text:'   '+r.sub,options:{fontSize:15,color:FAINT}}:{text:''}],{x:MX,y,w:9.2,h:0.45,fontFace:'Arial'});
      if(r.period) s.addText(r.period,{x:10.2,y,w:2.2,h:0.45,fontSize:13,color:FAINT,align:'right',fontFace:'Arial'});
      y+=0.5;
      if(r.desc){ s.addText(r.desc,{x:MX,y,w:11.4,h:0.6,fontSize:14,color:'6B6B6B',fontFace:'Arial'}); y+=0.62; }
      if(r.tags&&r.tags.length){ y=addChips(s,r.tags,MX,y,11.4,{fs:11,h:0.34})+0.05; }
      y+=0.22;
    });
    if(extra>0) s.addText(`외 ${extra}개 항목 생략됨`,{x:MX,y:6.6,w:11,h:0.35,fontSize:12,color:FAINT,italic:true,fontFace:'Arial'});
    const nn=String(slideNum).padStart(2,'0'), tt=String(totalSlides).padStart(2,'0');
    s.addText(`${nn} / ${tt}`,{x:11.4,y:6.85,w:1.4,h:0.35,fontSize:12,color:FAINT,align:'right',fontFace:'Arial'});
    return s;
  }
  if(st.experience.length) listSlide('💼','경력',st.experience.map(x=>({title:x.role||'',sub:(x.company?'· '+x.company:'')+(x.level?' · '+x.level:''),period:x.period,desc:x.desc})));
  if(st.projects.length) listSlide('🚀','프로젝트',st.projects.map(x=>({title:x.name||'',sub:x.role?'· '+x.role:'',desc:[x.desc,x.result?'🏆 '+x.result:''].filter(Boolean).join('\n'),tags:(x.tech||'').split(',').map(t=>t.trim()).filter(Boolean)})));

  // Slide 5 — education + contact ------------------------------------
  const s5=pptx.addSlide(); s5.background={color:WHITE}; bandTop(s5); kicker(s5,'교육 · 연락처'); heading(s5,'🎓','교육');
  let ey=2.0;
  (st.education.length?st.education:[{school:'—'}]).forEach(x=>{
    s5.addText([{text:x.school||'',options:{bold:true,fontSize:18,color:TX}},x.degree?{text:'   · '+x.degree,options:{fontSize:15,color:FAINT}}:{text:''}],{x:MX,y:ey,w:9.2,h:0.45,fontFace:'Arial'});
    if(x.period) s5.addText(x.period,{x:10.2,y:ey,w:2.2,h:0.45,fontSize:13,color:FAINT,align:'right',fontFace:'Arial'});
    ey+=0.6;
  });
  const contacts=[];
  if(p.email)contacts.push('✉  '+p.email); if(p.github)contacts.push('🔗  '+p.github);
  if(p.website)contacts.push('🌐  '+p.website); if(p.location)contacts.push('📍  '+p.location);
  if(contacts.length){ ey+=0.3; s5.addText('📬  연락처',{x:MX,y:ey,w:11,h:0.55,fontSize:24,bold:true,color:TX,fontFace:'Arial'}); ey+=0.75;
    s5.addText(contacts.join('\n'),{x:MX,y:ey,w:11.4,h:2,fontSize:16,color:'6B6B6B',lineSpacingMultiple:1.4,fontFace:'Arial'}); }
  {const nn=String(totalSlides).padStart(2,'0');s5.addText(`${nn} / ${nn}`,{x:11.4,y:6.85,w:1.4,h:0.35,fontSize:12,color:FAINT,align:'right',fontFace:'Arial'});}

  const name=(p.name||'portfolio').replace(/\s+/g,'-').toLowerCase();
  pptx.writeFile({fileName:name+'-portfolio.pptx'}).then(()=>toast('📽️ PowerPoint 파일을 다운로드했어요')).catch(()=>toast('PPTX 생성 중 오류가 발생했어요'));
}

    t.style.cssText='position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(20px);z-index:300;background:rgb(35,35,35);color:#fff;padding:11px 18px;border-radius:10px;font-size:13.5px;font-weight:500;box-shadow:0 10px 40px rgba(0,0,0,.35);opacity:0;transition:.25s;pointer-events:none;white-space:nowrap;max-width:90vw;text-align:center';

function importJSON(){
  closeMenus();
  const inp=document.createElement('input'); inp.type='file'; inp.accept='.json,application/json';
  inp.onchange=()=>{
    if(!inp.files||!inp.files[0]) return;
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const d=JSON.parse(e.target.result);
        if(!d||typeof d!=='object') throw new Error('올바른 JSON 형식이 아닙니다');
        undoStack.push(snapshot()); // 현재 상태 보존
        state=Object.assign(emptyState(),d);
        state.theme=Object.assign({mode:'light',font:'sans',cover:'graphite',coverImg:'',solidColor:'',accent:'',layout:'notion',wide:true,style:'classic',noCover:false},d.theme||{});
        state.profile=Object.assign(emptyState().profile,d.profile||{});
        state.custom=Array.isArray(d.custom)?d.custom:[];
        state.github=(d.github&&typeof d.github==='object')?{user:d.github.user||'',repos:Array.isArray(d.github.repos)?d.github.repos:[]}:{user:'',repos:[]};
        state.sectionOrder=Array.isArray(d.sectionOrder)?d.sectionOrder:['skills','tools','experience','projects','education'];
        prevSnap=null; activeCustom=-1;
        afterDataSwap();
        toast('📥 JSON을 불러왔어요');
      }catch(err){ toast('❌ JSON 오류: '+err.message); }
    };
    reader.readAsText(inp.files[0]);
  };
  inp.click();
}

function initResizer(){
  const rez=document.getElementById('ed-resizer'); if(!rez) return;

    if(e.target.closest('.ed-collapse')) return;
    if(editorCollapsed){ toggleEditorCollapse(); return; }
    dragging=true; rez.classList.add('dragging');
    document.body.style.cursor='col-resize'; document.body.style.userSelect='none'; e.preventDefault();
  });

  rez.addEventListener('dblclick',e=>{ if(!e.target.closest('.ed-collapse')) toggleEditorCollapse(); });

/* GitHub 저장소 자동 연동 — 사용자명/주소 → 대표 저장소 6개 */
function importGitHub(){
  const raw=(state.profile.github||'').trim();
  const m=raw.match(/github\.com\/([A-Za-z0-9-]+)/i) || raw.match(/^@?([A-Za-z0-9-]+)$/);
  const user=m?m[1]:'';
  const status=document.getElementById('gh-status');
  const setS=t=>{ if(status) status.textContent=t; };
  if(!user){ setS('GitHub 사용자명 또는 주소를 먼저 입력하세요'); return; }
  setS('불러오는 중…');
  fetch('https://api.github.com/users/'+encodeURIComponent(user)+'/repos?per_page=100&sort=updated')
    .then(r=>{ if(!r.ok) throw new Error(r.status===404?'사용자를 찾을 수 없어요':(r.status===403?'요청 한도 초과 — 잠시 후 다시 시도하세요':'요청 실패('+r.status+')')); return r.json(); })
    .then(list=>{
      if(!Array.isArray(list)) throw new Error('응답 형식 오류');
      const repos=list.filter(x=>!x.fork).sort((a,b)=>(b.stargazers_count||0)-(a.stargazers_count||0)).slice(0,6)
        .map(x=>({name:x.name||'',desc:x.description||'',url:x.html_url||'',stars:x.stargazers_count||0,lang:x.language||''}));
      state.github={user,repos};
      renderStep(); liveUpdate();
      const st2=document.getElementById('gh-status'); if(st2) st2.textContent=repos.length?`✓ ${user} · 대표 저장소 ${repos.length}개 추가`:'표시할 저장소가 없어요';
      toast(repos.length?`🐙 GitHub 저장소 ${repos.length}개를 추가했어요`:'표시할 저장소가 없어요');
    })
    .catch(e=>{ setS('⚠️ '+e.message); });
}

/* 모바일로 바로 보기 — 현재 작업을 압축해 링크+QR로 공유 (이미지 제외) */
function qrSrc(url){ return 'https://api.qrserver.com/v1/create-qr-code/?size=560x560&margin=12&ecc=L&data='+encodeURIComponent(url); }
const _hasCS = typeof CompressionStream!=='undefined' && typeof DecompressionStream!=='undefined';
async function gzipB64(str){
  const plain='j'+btoa(unescape(encodeURIComponent(str))).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  if(plain.length<=1800 || !_hasCS) return plain; // 소형/미지원 → 범용(어느 기기서나 해독)
  const buf=await new Response(new Blob([str]).stream().pipeThrough(new CompressionStream('gzip'))).arrayBuffer();
  let bin=''; const u8=new Uint8Array(buf); for(let i=0;i<u8.length;i++) bin+=String.fromCharCode(u8[i]);
  const gz='g'+btoa(bin).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  return gz.length<plain.length?gz:plain;
}
async function gunzipB64(tok){
  const tag=tok[0], b64=tok.slice(1).replace(/-/g,'+').replace(/_/g,'/'), bin=atob(b64);
  if(tag==='j') return decodeURIComponent(escape(bin));
  const u8=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) u8[i]=bin.charCodeAt(i);
  const buf=await new Response(new Blob([u8]).stream().pipeThrough(new DecompressionStream('gzip'))).arrayBuffer();
  return new TextDecoder().decode(buf);
}
function shareState(){ const s=JSON.parse(JSON.stringify(state)); if(s.profile)s.profile.iconImg=''; if(s.theme)s.theme.coverImg=''; return s; }
let _shareBase='';
function openQR(){
  let ov=document.getElementById('qr-overlay');
  if(!ov){
    ov=document.createElement('div'); ov.id='qr-overlay'; ov.className='qr-ov hidden';
    ov.setAttribute('role','dialog'); ov.setAttribute('aria-label','모바일로 보기');
    ov.innerHTML='<div class="qr-card"><div class="qr-title">모바일로 바로 보기</div>'+
      '<div class="qr-box"><div id="qr-empty" class="qr-empty">생성 중…</div><img id="qr-img" alt="QR 코드" style="display:none"></div>'+
      '<div class="share-link-row"><input id="share-link" class="inp" readonly><button class="share-copy" id="share-copy" title="링크 복사" aria-label="링크 복사"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></button></div>'+
      '<div class="qr-base"><label class="qr-base-label">POFO 주소 (배포 주소 또는 같은 WiFi의 PC IP)</label><input id="share-base" class="inp" autocomplete="off"></div>'+
      '<div class="qr-status" id="share-status"></div>'+
      '<div class="qr-actions"><button class="vbtn" id="qr-close">닫기</button><button class="tbtn primary" id="qr-dl">QR 저장</button></div></div>';
    document.body.appendChild(ov);
    ov.onclick=(e)=>{ if(e.target===ov) ov.classList.add('hidden'); };
    document.getElementById('qr-close').onclick=()=>ov.classList.add('hidden');
    document.getElementById('qr-dl').onclick=downloadQR;
    document.getElementById('share-copy').onclick=()=>{ const l=document.getElementById('share-link'); copyText(l.value).then(()=>toast('🔗 링크를 복사했어요')); };
    document.getElementById('share-base').addEventListener('input',()=>{ _shareBase=document.getElementById('share-base').value.trim(); renderShare(); });
  }
  if(!_shareBase) _shareBase=(location.origin+location.pathname).replace(/#.*$/,'');
  document.getElementById('share-base').value=_shareBase;
  ov.classList.remove('hidden'); renderShare();

async function renderShare(){
  const img=document.getElementById('qr-img'), empty=document.getElementById('qr-empty');
  const linkInp=document.getElementById('share-link'), status=document.getElementById('share-status');
  if(!img) return;
  empty.style.display='grid'; empty.textContent='생성 중…'; img.style.display='none';
  let token; try{ token=await gzipB64(JSON.stringify(shareState())); }catch(e){ empty.textContent='생성 실패'; return; }
  const base=(_shareBase||location.origin+location.pathname).replace(/#.*$/,'');
  const url=base+'#p='+token;
  linkInp.value=url;
  status.innerHTML = url.length>2500 ? '⚠️ 내용이 많아 QR이 복잡해요 — 스캔이 안 되면 링크를 직접 공유하세요.' : '';
  img.crossOrigin='anonymous';
  img.onload=()=>{ img.style.display='block'; empty.style.display='none'; };
  img.onerror=()=>{ empty.textContent='QR 생성 실패'; };
  img.src=qrSrc(url);
}
function downloadQR(){
  const img=document.getElementById('qr-img');
  if(!img||!img.complete||!img.naturalWidth){ toast('QR이 아직 준비되지 않았어요'); return; }
  try{
    const c=document.createElement('canvas'); c.width=img.naturalWidth; c.height=img.naturalHeight;
    c.getContext('2d').drawImage(img,0,0);
    const a=document.createElement('a'); a.href=c.toDataURL('image/png'); a.download='portfolio-qr.png'; a.click();
    toast('🔳 QR 코드를 저장했어요');
  }catch(e){ const l=document.getElementById('share-link'); if(l) window.open(qrSrc(l.value),'_blank'); toast('새 탭에서 이미지를 저장하세요'); }
}
/* 공유 링크(#p=)로 열렸을 때 현재 데이터로 로드 */
function tryHashLoad(){
  const h=location.hash||'';
  if(h.indexOf('#p=')!==0) return false;
  const token=h.slice(3); if(!token) return false;
  gunzipB64(token).then(json=>{
    const d=JSON.parse(json);
    state=Object.assign(emptyState(),d);
    state.theme=Object.assign(emptyState().theme,d.theme||{});
    state.profile=Object.assign(emptyState().profile,d.profile||{});
    state.tools=Array.isArray(d.tools)?d.tools:[];
    state.custom=Array.isArray(d.custom)?d.custom:[];
    state.github=(d.github&&typeof d.github==='object')?{user:d.github.user||'',repos:Array.isArray(d.github.repos)?d.github.repos:[]}:{user:'',repos:[]};
    state.sectionOrder=Array.isArray(d.sectionOrder)?d.sectionOrder:['skills','tools','experience','projects','education'];
    currentStep=0; visited=new Set([0]); activeCustom=-1; prevSnap=null;
    try{ history.replaceState(null,'',location.pathname+location.search); }catch(_){}
    afterDataSwap();
    toast('📱 공유된 포트폴리오를 불러왔어요');
  }).catch(()=>{ toast('공유 링크의 데이터를 읽지 못했어요'); });
  return true;
}

function openLogoZoom(src){
  let ov=document.getElementById('logo-zoom');
  if(!ov){
    ov=document.createElement('div');
    ov.id='logo-zoom'; ov.className='logo-zoom hidden';
    ov.setAttribute('role','dialog'); ov.setAttribute('aria-label','POFO 로고');
    ov.innerHTML='<div class="logo-zoom-card"><img alt="POFO" src="'+src+'"></div>';
    document.body.appendChild(ov);
    ov.onclick=()=>ov.classList.add('hidden');
  } else { ov.querySelector('img').src=src; }
  ov.classList.remove('hidden');
}

function init(){
  // 브랜드 로고 = 파비콘 이미지 재사용(파일 중복 없이)
  const _fav=document.querySelector('link[rel="icon"]');
  if(_fav) document.querySelectorAll('.logo-img').forEach(el=>{ el.style.backgroundImage="url('"+_fav.href+"')"; });
  // 상단바 로고 클릭 → POFO 이미지 확대
  const _brandLogo=document.querySelector('.brand .logo');
  if(_brandLogo && _fav){ _brandLogo.style.cursor='pointer'; _brandLogo.setAttribute('role','button'); _brandLogo.title='POFO 로고 크게 보기'; _brandLogo.onclick=()=>openLogoZoom(_fav.href); }
  const hadSave=load();
  loadUI();
  // inject shared CSS
  document.getElementById('page-css').textContent=THEME_CSS+PAGE_CSS;
  document.getElementById('slide-css').textContent=SLIDE_CSS;

  applyTheme();
  buildCoverGrid();
  renderStep();
  liveUpdate();
  applyEditor();
  initResizer();

  // topbar
  document.getElementById('btn-guide').onclick=openGuide;
  document.getElementById('btn-slides').onclick=openSlides;
  document.getElementById('btn-about').onclick=(e)=>toggleMenu('menu-about',e);
  document.getElementById('btn-export').onclick=(e)=>toggleMenu('menu-export',e);
  // 공유 메뉴 — 형식 선택 + 복사/다운로드
  const _fsel=document.getElementById('fmt-select');
  if(_fsel){
    const upd=()=>{ const f=EXPORT_FMTS[_fsel.value]; const cb=document.getElementById('fmt-copy'); cb.disabled=!f.copy; cb.title=f.copy?'클립보드로 복사':'이 형식은 복사할 수 없어요'; };
    _fsel.onchange=upd; upd();
    document.getElementById('fmt-copy').onclick=()=>{ const f=EXPORT_FMTS[_fsel.value]; if(f.copy) handleAction(f.copy); };
    document.getElementById('fmt-download').onclick=()=>{ handleAction(EXPORT_FMTS[_fsel.value].download); };
  }


  // actions (export menu + sidebar + finish step use data-export / delegate)
  document.addEventListener('click',(e)=>{
    const a=e.target.closest('[data-export]');
    if(a){ handleAction(a.dataset.export); return; }
  });

  // step nav
  document.getElementById('nav-prev').onclick=prev;
  document.getElementById('nav-next').onclick=next;
  document.getElementById('nav-skip').onclick=next;

  // close menus on outside click
  document.addEventListener('click',(e)=>{ if(!e.target.closest('.menu-wrap')) closeMenus(); });

  // mobile tabs
  document.querySelectorAll('.mt-btn').forEach(b=>b.onclick=()=>setMobTab(b.dataset.tab));
  // editor tabs (포트폴리오 / 스타일)
  document.querySelectorAll('.ed-tab').forEach(b=>b.onclick=()=>setEditorTab(b.dataset.edtab));

  // global keys
  document.addEventListener('keydown',(e)=>{
    // 로고 확대 닫기
    const lz=document.getElementById('logo-zoom');
    if(lz && !lz.classList.contains('hidden')){ if(e.key==='Escape') lz.classList.add('hidden'); return; }
    // Undo: Ctrl+Z / Cmd+Z
    if((e.ctrlKey||e.metaKey)&&e.key==='z'&&!e.shiftKey){ e.preventDefault(); undo(); return; }
    if(!document.getElementById('slides-overlay').classList.contains('hidden'))return;
    if(!document.getElementById('guide-overlay').classList.contains('hidden'))return;
    const typing=/INPUT|TEXTAREA|SELECT/.test(document.activeElement.tagName);
    if(typing)return;
    if(e.key==='ArrowRight')next(); else if(e.key==='ArrowLeft')prev();
  });

  // 공유 링크(#p=)로 열렸으면 그 데이터로 로드 (저장본보다 우선)
  const fromHash=tryHashLoad();
  // first run → open the guided 자동 입력 flow automatically
  if(!hadSave && !fromHash) setTimeout(openGuide,260);
}
init();
</script>
</body>
</html>
